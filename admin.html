<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes"><meta name="theme-color" content="#080a0f">
<title>旅遊通 管理後台</title>
<link rel="manifest" href="manifest-admin.json">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080a0f;color:#e5e7eb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
button{cursor:pointer;font-family:inherit}input{font-family:inherit}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fi{animation:fadeIn .3s ease-out}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:2px}
.toggle{position:relative;width:44px;height:24px;border-radius:12px;border:none;cursor:pointer;transition:background .2s}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.toggle.on{background:linear-gradient(135deg,#10b981,#0d9488)}.toggle.on::after{transform:translateX(20px)}
.toggle.off{background:#333}.toggle.off::after{transform:translateX(0)}
.tab-bar{display:flex;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid rgba(255,255,255,.06)}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:12px 18px;font-size:13px;font-weight:600;color:#555;background:none;border:none;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0}
.tab-btn.active{color:#10b981;border-bottom-color:#10b981}
.card{padding:14px;border-radius:12px;background:#12141a;border:1px solid rgba(255,255,255,.04);margin-bottom:8px}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700}
</style>
</head>
<body>
<script>
(function(){
  var ua=navigator.userAgent||'';
  var isInApp=/Line\/|FBAV|FBAN|Instagram|WeChat|MicroMessenger|Twitter|Threads|TikTok|Snapchat|Pinterest|Telegram/i.test(ua);
  if(!isInApp)return;
  var isIOS=/iPhone|iPad|iPod/i.test(ua);
  var lang=localStorage.getItem('tw_lang')||'zh';var id=lang==='id';
  var browser=isIOS?'Safari':'Chrome';
  var d=document.createElement('div');d.id='inapp-guide';
  d.style.cssText='position:fixed;inset:0;z-index:99999;background:#080a0f;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;font-family:sans-serif';
  d.innerHTML='<div style="font-size:64px;margin-bottom:16px">🌐</div><h2 style="color:#fff;font-size:20px;margin-bottom:12px">'+(id?'Buka di '+browser:'請使用 '+browser+' 開啟')+'</h2><p style="color:#aaa;font-size:13px;line-height:1.8">'+(id?'Browser bawaan tidak bisa login<br>Pilih "Buka di Browser" dari menu':'內建瀏覽器無法正常登入<br>請點選單選擇「在瀏覽器中開啟」')+'</p><button onclick="this.parentElement.style.display=\'none\'" style="margin-top:20px;padding:10px 24px;border-radius:10px;color:#888;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);font-size:13px;cursor:pointer">'+(id?'Lanjutkan':'繼續使用')+'</button>';
  document.body.appendChild(d);
})();
</script>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect}=React;
const FB={apiKey:"AIzaSyBvqejbFgYlv27s5b_RQvDI-gkX1trHGjg",authDomain:"taiwan-travel-6effd.firebaseapp.com",projectId:"taiwan-travel-6effd",storageBucket:"taiwan-travel-6effd.firebasestorage.app",messagingSenderId:"1032819814937",appId:"1:1032819814937:web:e13070aba94f0448797088"};
let auth=null,db=null;
try{firebase.initializeApp(FB);auth=firebase.auth();db=firebase.firestore()}catch{}
const fmtD=ts=>{if(!ts)return"";const d=ts.toDate?ts.toDate():new Date(ts);return d.getFullYear()+"/"+(d.getMonth()+1)+"/"+d.getDate()+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0")};

function App(){
  const[user,setUser]=useState(null);const[loading,setLoading]=useState(true);const[isAdmin,setIsAdmin]=useState(false);
  const[tab,setTab]=useState("key");
  const[sharedKey,setSharedKey]=useState('');const[keyActive,setKeyActive]=useState(false);
  const[newKey,setNewKey]=useState('');const[saving,setSaving]=useState(false);
  const[wl,setWl]=useState([]);const[msg,setMsg]=useState('');
  const[installEvt,setInstallEvt]=useState(null);

  useEffect(()=>{window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();setInstallEvt(e)})},[]);
  useEffect(()=>{if(!auth)return;return auth.onAuthStateChanged(u=>{setUser(u);setLoading(false)})},[]);

  /* 載入資料 */
  useEffect(()=>{
    if(!user||!db)return;
    (async()=>{
      let cfg=await db.collection("admin").doc("config").get();
      if(!cfg.exists){await db.collection("admin").doc("config").set({admins:[user.uid],sharedKey:'',active:false});cfg=await db.collection("admin").doc("config").get()}
      const d=cfg.data();const adm=d.admins||[];
      if(adm.includes(user.uid)||adm.length===0){
        if(adm.length===0)await db.collection("admin").doc("config").set({admins:[user.uid]},{merge:true});
        setIsAdmin(true);setSharedKey(d.sharedKey||'');setNewKey(d.sharedKey||'');setKeyActive(!!d.active);
      }
      const snap=await db.collection("whitelist").orderBy("addedAt","desc").get();
      setWl(snap.docs.map(x=>({uid:x.id,...x.data()})));
    })();
  },[user]);

  const flash=m=>{setMsg(m);setTimeout(()=>setMsg(''),3500)};
  const signIn=()=>auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(()=>{});
  const signOut=()=>auth.signOut();

  /* 儲存 Key */
  const saveKey=async()=>{
    if(!newKey.trim()||!newKey.startsWith("AIza"))return flash("❌ 需以 AIza 開頭");
    setSaving(true);
    try{
      const r=await fetch('https://places.googleapis.com/v1/places:searchText',{method:'POST',
        headers:{'Content-Type':'application/json','X-Goog-Api-Key':newKey.trim(),'X-Goog-FieldMask':'places.id'},
        body:JSON.stringify({textQuery:"test",maxResultCount:1})});
      if(!r.ok){flash("❌ Key 無效或未啟用 API");setSaving(false);return}
      await db.collection("admin").doc("config").set({sharedKey:newKey.trim()},{merge:true});
      setSharedKey(newKey.trim());flash("✅ Key 已儲存");
    }catch{flash("❌ 失敗")}
    setSaving(false);
  };

  /* 啟用 / 停用共享 */
  const toggleActive=async()=>{
    if(!keyActive&&!sharedKey)return flash("❌ 請先設定 API Key");
    await db.collection("admin").doc("config").set({active:!keyActive},{merge:true});
    setKeyActive(!keyActive);
    flash(keyActive?"⛔ 已停用共享":"✅ 共享已啟用，所有登入用戶可使用");
  };

  /* 單一用戶開關 */
  const toggleUser=async(uid,en)=>{
    await db.collection("whitelist").doc(uid).update({enabled:!en});
    setWl(p=>p.map(w=>w.uid===uid?{...w,enabled:!en}:w));
    flash(en?"⛔ 已關閉此用戶權限":"✅ 已恢復權限");
  };

  /* 踢出（刪除白名單紀錄）*/
  const kickUser=async(uid,name)=>{
    if(!confirm("確定踢出 "+(name||"此用戶")+"？\n他需要自行輸入 Key 才能使用"))return;
    await db.collection("whitelist").doc(uid).delete();
    setWl(p=>p.filter(w=>w.uid!==uid));flash("🗑️ 已踢出");
  };

  /* ===== 畫面 ===== */
  if(loading)return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{width:32,height:32,border:"3px solid rgba(16,185,129,.2)",borderTopColor:"#10b981",borderRadius:"50%",animation:"spin 1s linear infinite"}}/></div>;

  if(!user)return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20,padding:20}}>
    <div style={{width:80,height:80,borderRadius:20,background:"linear-gradient(135deg,#10b981,#06b6d4)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:36}}>🔐</div>
    <h1 style={{fontSize:24,fontWeight:900}}>旅遊通 管理後台</h1>
    <button onClick={signIn} style={{padding:"14px 40px",borderRadius:14,fontSize:15,fontWeight:700,color:"#fff",background:"linear-gradient(135deg,#10b981,#0d9488)",border:"none",boxShadow:"0 4px 20px rgba(16,185,129,.3)"}}>Google 登入</button>
    {installEvt&&<button onClick={()=>{installEvt.prompt();setInstallEvt(null)}} style={{padding:"10px 20px",borderRadius:10,fontSize:12,fontWeight:700,color:"#fff",background:"linear-gradient(135deg,#f59e0b,#d97706)",border:"none"}}>📲 安裝 App</button>}
  </div>;

  if(!isAdmin)return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
    <div style={{fontSize:48}}>⛔</div><h2 style={{fontSize:18,fontWeight:800}}>無管理員權限</h2><p style={{color:"#666",fontSize:12}}>{user.email}</p>
    <button onClick={signOut} style={{padding:"8px 20px",borderRadius:8,fontSize:12,color:"#888",background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.06)"}}>登出</button></div>;

  const enabledCount=wl.filter(w=>w.enabled).length;

  return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
    {/* Header */}
    <div style={{background:"linear-gradient(135deg,#0d3320 0%,#10b981 50%,#06b6d4 100%)",padding:"20px 16px 14px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:40,height:40,borderRadius:12,background:"rgba(0,0,0,.25)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🗺️</div>
          <div><h1 style={{fontSize:18,fontWeight:900,color:"#fff"}}>旅遊通 管理後台</h1><p style={{fontSize:10,color:"rgba(255,255,255,.6)"}}>{user.displayName}</p></div>
        </div>
        <button onClick={signOut} style={{padding:"6px 12px",borderRadius:8,fontSize:10,color:"rgba(255,255,255,.7)",background:"rgba(0,0,0,.2)",border:"1px solid rgba(255,255,255,.1)"}}>登出</button>
      </div>
    </div>

    {/* Tabs */}
    <div className="tab-bar">
      {[{id:"key",n:"🔑 API Key"},{id:"users",n:"👥 白名單"}].map(t=><button key={t.id} className={"tab-btn"+(tab===t.id?" active":"")} onClick={()=>setTab(t.id)}>{t.n}</button>)}
    </div>

    {msg&&<div className="fi" style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",zIndex:200,padding:"10px 24px",borderRadius:12,background:"#12141a",border:"1px solid rgba(16,185,129,.3)",boxShadow:"0 8px 32px rgba(0,0,0,.5)",fontSize:13,fontWeight:700,color:"#10b981",maxWidth:"90vw"}}>{msg}</div>}

    <div style={{flex:1,padding:"16px 14px 40px",maxWidth:600,margin:"0 auto",width:"100%"}}>

      {/* ===== API Key Tab ===== */}
      {tab==="key"&&<div className="fi">
        {/* 狀態 */}
        <div className="card" style={{borderColor:keyActive?"rgba(16,185,129,.2)":"rgba(239,68,68,.15)",marginBottom:16}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <div>
              <p style={{fontSize:16,fontWeight:800}}>{keyActive?"🟢 共享啟用中":"🔴 共享未啟用"}</p>
              <p style={{fontSize:11,color:"#666",marginTop:2}}>{keyActive?enabledCount+" 位用戶正在使用":"啟用後登入的用戶自動使用此 Key"}</p>
            </div>
            <button className={"toggle "+(keyActive?"on":"off")} onClick={toggleActive}/>
          </div>
          {sharedKey&&<div style={{padding:10,borderRadius:8,background:"rgba(255,255,255,.02)"}}>
            <p style={{fontSize:10,color:"#888"}}>目前 Key</p>
            <p style={{fontSize:12,fontFamily:"monospace",color:"#ddd",wordBreak:"break-all",marginTop:2}}>{sharedKey.slice(0,20)}...{sharedKey.slice(-6)}</p>
          </div>}
        </div>

        {/* 輸入 Key */}
        <div className="card">
          <p style={{fontSize:14,fontWeight:700,marginBottom:10}}>{sharedKey?"更換 API Key":"設定 API Key"}</p>
          <input type="text" value={newKey} onChange={e=>setNewKey(e.target.value)} placeholder="AIzaSy..." style={{width:"100%",padding:"12px 14px",borderRadius:10,fontSize:13,color:"#fff",background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",outline:"none",fontFamily:"monospace",marginBottom:10}}/>
          <button disabled={saving} onClick={saveKey} style={{width:"100%",padding:12,borderRadius:10,fontSize:14,fontWeight:700,color:"#fff",background:saving?"#333":"linear-gradient(135deg,#10b981,#0d9488)",border:"none"}}>{saving?"驗證中...":"儲存 Key"}</button>
        </div>

        {/* 說明 */}
        <div className="card" style={{marginTop:8}}>
          <p style={{fontSize:12,fontWeight:700,color:"#888",marginBottom:6}}>運作流程</p>
          <p style={{fontSize:11,color:"#555",lineHeight:1.8}}>
            1️⃣ 在上方輸入你的 API Key → 儲存<br/>
            2️⃣ 打開「共享」開關 → 啟用<br/>
            3️⃣ 使用者登入 Google → 自動取得 Key 使用權<br/>
            4️⃣ 在「白名單」關閉某用戶 → 立即失去權限<br/>
            5️⃣ 被關閉的用戶重新載入 → 需自行輸入 Key
          </p>
        </div>

        <a href="index.html" style={{display:"block",textAlign:"center",marginTop:20,fontSize:12,color:"#10b981"}}>← 返回旅遊通</a>
      </div>}

      {/* ===== 白名單 Tab ===== */}
      {tab==="users"&&<div className="fi">
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <h2 style={{fontSize:16,fontWeight:800}}>👥 白名單</h2>
          <div style={{display:"flex",gap:6}}>
            <span className="badge" style={{background:"rgba(16,185,129,.1)",color:"#10b981"}}>{enabledCount} 啟用</span>
            <span className="badge" style={{background:"rgba(255,255,255,.04)",color:"#555"}}>{wl.length} 總計</span>
          </div>
        </div>
        <p style={{fontSize:11,color:"#555",marginBottom:14}}>使用者登入 Google 後自動出現在此。關閉開關 = 撤銷權限。</p>

        {!wl.length?<div className="card" style={{textAlign:"center",padding:40}}><p style={{fontSize:32,marginBottom:8}}>😴</p><p style={{color:"#555",fontSize:12}}>尚無用戶登入過</p></div>
        :wl.map(w=><div key={w.uid} className="card fi" style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:42,height:42,borderRadius:"50%",background:w.enabled?"rgba(16,185,129,.1)":"rgba(239,68,68,.06)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0,border:"2px solid "+(w.enabled?"rgba(16,185,129,.25)":"rgba(239,68,68,.15)")}}>{w.enabled?"✅":"⛔"}</div>
          <div style={{flex:1,minWidth:0}}>
            <p style={{fontSize:14,fontWeight:700,color:w.enabled?"#eee":"#555"}}>{w.name||"未知"}</p>
            <p style={{fontSize:10,color:"#555"}}>{w.email}</p>
            <p style={{fontSize:9,color:"#333",marginTop:1}}>{fmtD(w.addedAt)}</p>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end",flexShrink:0}}>
            <button className={"toggle "+(w.enabled?"on":"off")} onClick={()=>toggleUser(w.uid,w.enabled)}/>
            <button onClick={()=>kickUser(w.uid,w.name)} style={{fontSize:9,color:"#ef4444",background:"none",border:"none"}}>踢出</button>
          </div>
        </div>)}
      </div>}

    </div>
  </div>
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw-admin.js').catch(()=>{})}
</script>
</body>
</html>
