const REGION_ALIAS={"台北市":"台北","新北市":"新北","基隆市":"基隆","桃園市":"桃園","新竹市":"新竹","新竹縣":"新竹","苗栗縣":"苗栗","台中市":"台中","臺中市":"台中","彰化縣":"彰化","南投縣":"南投","雲林縣":"雲林","嘉義市":"嘉義","嘉義縣":"嘉義","台南市":"台南","臺南市":"台南","高雄市":"高雄","屏東縣":"屏東","宜蘭縣":"宜蘭","花蓮縣":"花蓮","台東縣":"台東","臺東縣":"台東","澎湖縣":"澎湖","金門縣":"金門","連江縣":"馬祖","臺北市":"台北","桃園縣":"桃園","苗栗市":"苗栗","彰化市":"彰化","南投市":"南投","雲林市":"雲林","屏東市":"屏東","宜蘭市":"宜蘭","花蓮市":"花蓮","台東市":"台東","澎湖市":"澎湖","金門市":"金門"};
const matchRegion=(components)=>{
  for(const comp of components){if(comp.types?.includes("administrative_area_level_1")){const m=REGION_ALIAS[comp.long_name]||REGION_ALIAS[comp.short_name];if(m)return m}}

};

/* ---- Multi-query fetch: 5 parallel queries x 20 = up to ~100 deduplicated results ---- */
const cache=new Map();
const HDRS_BASE={'Content-Type':'application/json','X-Goog-FieldMask':'places.id,places.displayName,places.formattedAddress,places.rating,places.userRatingCount,places.photos,places.location,places.editorialSummary,places.currentOpeningHours,places.googleMapsUri,places.priceLevel'};
const parseP=(p,catId)=>({id:p.id,n:p.displayName?.text||'',a:p.formattedAddress||'',r:p.rating||0,rc:p.userRatingCount||0,lat:p.location?.latitude,lng:p.location?.longitude,d:p.editorialSummary?.text||'',photos:p.photos||[],hours:p.currentOpeningHours?.weekdayDescriptions||[],isOpen:p.currentOpeningHours?.openNow,mapsUrl:p.googleMapsUri||'',category:catId});

async function fetchP(key,cLat,cLng,radius,regionName,catId,onProgress){
  const ck=cLat.toFixed(3)+','+cLng.toFixed(3)+'-'+catId;
  if(cache.has(ck))return cache.get(ck);
  const cat=CATS.find(c=>c.id===catId);
  const hdrs={...HDRS_BASE,'X-Goog-Api-Key':key};
  const loc={circle:{center:{latitude:cLat,longitude:cLng},radius}};
  const seen=new Set();const all=[];
  /* Fire all sub-queries in parallel */
  const batches=await Promise.all(cat.queries.map(async q=>{
    try{
      const res=await fetch('https://places.googleapis.com/v1/places:searchText',{method:'POST',headers:hdrs,body:JSON.stringify({textQuery:regionName+' '+q,maxResultCount:20,languageCode:'zh-TW',locationBias:loc})});
      if(!res.ok)return[];
      const data=await res.json();
      return(data.places||[]).map(p=>parseP(p,catId));
    }catch(e){return[]}
  }));
  for(const batch of batches){
    for(const p of batch){if(!seen.has(p.id)){seen.add(p.id);all.push(p)}}
    if(onProgress)onProgress(all.length);
  }
  all.sort((a,b)=>(b.r*Math.log10(b.rc+1))-(a.r*Math.log10(a.rc+1)));
  cache.set(ck,all);return all;
}

const pCache=new Map();
function Photo({photos,name,apiKey}){
  const[src,setSrc]=useState(null);const[ld,setLd]=useState(false);const tried=useRef(false);
  useEffect(()=>{
    if(tried.current||!photos?.length||!apiKey)return;tried.current=true;
    const ref=photos[0].name;
    if(pCache.has(ref)){setSrc(pCache.get(ref));return}
    (async()=>{
      try{
        const r=await fetch('https://places.googleapis.com/v1/'+ref+'/media?maxHeightPx=400&maxWidthPx=640&key='+apiKey+'&skipHttpRedirect=true');
        if(r.ok){const d=await r.json();if(d.photoUri){pCache.set(ref,d.photoUri);setSrc(d.photoUri);return}}
        const fb='https://places.googleapis.com/v1/'+ref+'/media?maxHeightPx=400&maxWidthPx=640&key='+apiKey;
        pCache.set(ref,fb);setSrc(fb);
      }catch(e){}
    })();
  },[photos,apiKey]);
  const h=(name||"").split("").reduce((a,c)=>a+c.charCodeAt(0),0);
  const g=["linear-gradient(135deg,#0c4a6e,#155e75)","linear-gradient(135deg,#7c2d12,#92400e)","linear-gradient(135deg,#3730a3,#4338ca)","linear-gradient(135deg,#166534,#15803d)","linear-gradient(135deg,#831843,#9d174d)"];
  return <div style={{position:"relative",width:"100%",height:"100%",background:g[h%g.length],display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>{!ld&&src&&<div className="shimmer-bg" style={{position:"absolute",inset:0}}/>}<span style={{fontSize:"1.4rem",fontWeight:900,color:"rgba(255,255,255,.06)"}}>{(name||"").slice(0,4)}</span>{src&&<img className={"ph"+(ld?" loaded":"")} src={src} alt={name} onLoad={()=>setLd(true)} onError={()=>setLd(false)} loading="lazy" referrerPolicy="no-referrer"/>}</div>
}

function App(){
  const[region,setRegion]=useState(null);
  const[cat,setCat]=useState("attraction");
  const[search,setSearch]=useState("");
  const[places,setPlaces]=useState([]);
  const[loading,setLoading]=useState(false);
  const[loadCount,setLoadCount]=useState(0);
  const[itin,setItin]=useState([]);
  const[sidebar,setSidebar]=useState(false);
  const[days,setDays]=useState(2);
  const[transport,setTransport]=useState("car");
  const[plan,setPlan]=useState(null);
  const[view,setView]=useState("explore");
  const[picker,setPicker]=useState(false);
  const[geoLoading,setGeoLoading]=useState(false);
  const[geoMsg,setGeoMsg]=useState("");
  const[apiKey]=useState(AK);
  const[userLoc,setUserLoc]=useState(null);

  useEffect(()=>{
    if(!region||!apiKey)return;
    const r=REGIONS.find(x=>x.n===region);if(!r)return;
    const useLoc=userLoc&&userLoc.region===region;
    const cLat=useLoc?userLoc.lat:r.lat;
    const cLng=useLoc?userLoc.lng:r.lng;
    const rad=useLoc?15000:(r.rad||15000);
    setLoading(true);setLoadCount(0);
    fetchP(apiKey,cLat,cLng,rad,region,cat,n=>setLoadCount(n)).then(d=>{setPlaces(d);setLoading(false)});
  },[region,cat,apiKey,userLoc]);

  const filtered=search?places.filter(p=>p.n.includes(search)||p.d?.includes(search)||p.a?.includes(search)):places;
  const nameSet=new Set(itin.map(i=>i.n));
  const add=(p,c)=>{if(nameSet.has(p.n))return;setItin(prev=>[...prev,{...p,category:c,_region:region,id:Date.now()}])};
  const rm=i=>setItin(p=>p.filter((_,x)=>x!==i));
  const mv=(i,d)=>{const j=i+d;if(j<0||j>=itin.length)return;setItin(p=>{const n=[...p];[n[i],n[j]]=[n[j],n[i]];return n})};
  const curT=TRANS.find(x=>x.id===transport)||TRANS[0];

  const refresh=()=>{
    if(!region||!apiKey)return;
    const r=REGIONS.find(x=>x.n===region);
    const useLoc=userLoc&&userLoc.region===region;
    const cLat=useLoc?userLoc.lat:r.lat;
    const cLng=useLoc?userLoc.lng:r.lng;
    const prefix=cLat.toFixed(3)+','+cLng.toFixed(3)+'-';
    for(const k of cache.keys()){if(k.startsWith(prefix))cache.delete(k)}
    const rad=useLoc?15000:(r.rad||15000);
    setLoading(true);setLoadCount(0);
    fetchP(apiKey,cLat,cLng,rad,region,cat,n=>setLoadCount(n)).then(d=>{setPlaces(d);setLoading(false)});
  };

  const geolocate=()=>{
    if(!navigator.geolocation){setGeoMsg("不支援定位");return}
    setGeoLoading(true);setGeoMsg("");
    navigator.geolocation.getCurrentPosition(async pos=>{
      const lat=pos.coords.latitude,lng=pos.coords.longitude,acc=pos.coords.accuracy;
      let district="",foundRegion=null;
      try{
        const r=await fetch('https://maps.googleapis.com/maps/api/geocode/json?latlng='+lat+','+lng+'&language=zh-TW&key='+apiKey);
        const d=await r.json();
        if(d.status==='OK'&&d.results?.length){
          for(const result of d.results){
            const comps=result.address_components||[];
            for(const c of comps){
              if(!district&&(c.types?.includes("administrative_area_level_3")||c.types?.includes("administrative_area_level_2")||c.types?.includes("locality")||c.types?.includes("sublocality_level_1")))
                district=c.long_name;
            }
            if(!foundRegion)foundRegion=matchRegion(comps);
          }
        }
      }catch(e){}
      if(!foundRegion){
        const toRad=x=>x*Math.PI/180;let best=REGIONS[0],min=1e9;
        REGIONS.forEach(r=>{const dLat=toRad(r.lat-lat),dLng=toRad(r.lng-lng);const a=Math.sin(dLat/2)**2+Math.cos(toRad(lat))*Math.cos(toRad(r.lat))*Math.sin(dLng/2)**2;const km=6371*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));if(km<min){min=km;best=r}});
        foundRegion=best.n;
      }
      setUserLoc({lat,lng,region:foundRegion,district,accuracy:Math.round(acc)});
      setRegion(foundRegion);
      setGeoLoading(false);
      const locStr=district?foundRegion+' · '+district:foundRegion;
      setGeoMsg('📍 '+locStr+'（精度 ±'+Math.round(acc)+'m）');
    },err=>{
      setGeoLoading(false);
      setGeoMsg(err.code===1?"請允許定位權限後重試":err.code===3?"定位逾時，請確認 GPS 後重試":"定位失敗，請手動選擇");
    },{timeout:15000,enableHighAccuracy:true,maximumAge:0});
  };

  const mkPlan=(items,nd,tid)=>{const t=TRANS.find(x=>x.id===tid)||TRANS[0];const pd=Math.max(3,Math.ceil(items.length/nd));const ds=[];for(let d=0;d<nd;d++){const ch=items.slice(d*pd,(d+1)*pd);if(!ch.length)continue;const ts=["08:00","09:30","11:00","12:30","14:00","15:30","17:00","18:30"];const stops=ch.map((s,i)=>{let tn="";if(i<ch.length-1){const nx=ch[i+1];if(s.lat&&nx.lat){const km=Math.round(Math.sqrt(Math.pow((nx.lat-s.lat)*111,2)+Math.pow((nx.lng-s.lng)*111*Math.cos(s.lat*Math.PI/180),2)));tn=t.e+' 約'+Math.max(5,Math.round(km/t.spd*60))+'分（'+km+'km）'}}return{time:ts[Math.min(i,7)],name:s.n,address:s.a||"",dur:s.category==="food"?"40-60分":"1-2小時",type:s.category,transport:tn,lat:s.lat,lng:s.lng,mapsUrl:s.mapsUrl}});ds.push({day:d+1,stops})}return{title:nd+'日'+t.n+'旅行',days:ds,gm:t.gm}};

  if(!region)return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",position:"relative"}}><div className="hero-bg"/><div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"20px 16px",position:"relative",zIndex:1}}>
    <div className="fu" style={{textAlign:"center",marginBottom:28}}>
      <div style={{display:"inline-flex",alignItems:"center",gap:6,padding:"6px 14px",borderRadius:20,background:"rgba(16,185,129,.08)",border:"1px solid rgba(16,185,129,.15)",color:"#10b981",fontSize:11,fontWeight:700,marginBottom:20,animation:"float 4s ease-in-out infinite"}}>✨ Google Places API 即時資料 ・ 導航 ・ 街景</div>
      <h1 style={{fontSize:48,fontWeight:900,letterSpacing:-2,lineHeight:1.1}}><span style={{background:"linear-gradient(135deg,#10b981,#14b8a6,#06b6d4)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>台灣</span>旅遊通</h1>
      <p style={{color:"#555",fontSize:14,marginTop:12,lineHeight:1.6}}>即時抓取 Google 最新景點・美食・住宿<br/>實景照片 ・ 一鍵導航 ・ 街景預覽 ・ 智慧排程</p>
    </div>
    <button className="fu" onClick={geolocate} disabled={geoLoading} style={{animationDelay:".12s",display:"flex",alignItems:"center",gap:8,padding:"14px 28px",borderRadius:16,background:"linear-gradient(135deg,#10b981,#0d9488)",color:"#fff",fontSize:15,fontWeight:700,boxShadow:"0 8px 32px rgba(16,185,129,.25)",marginBottom:8,animation:"glow 3s ease-in-out infinite"}}>{geoLoading?<span style={{width:18,height:18,border:"2.5px solid rgba(255,255,255,.3)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>:<Ico d={I.nav} s={18} f="white" c="white"/>}{geoLoading?"定位中...":"📍 使用目前位置"}</button>
    {geoMsg&&<p className="fi" style={{fontSize:12,color:geoMsg.includes("📍")?"#10b981":"#f59e0b",marginBottom:8}}>{geoMsg}</p>}
    <p className="fu" style={{animationDelay:".2s",fontSize:11,color:"#444",letterSpacing:3,marginTop:16,marginBottom:12}}>或選擇目的地</p>
    <div className="fu" style={{animationDelay:".25s",display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,maxWidth:440,width:"100%"}}>{REGIONS.map(r=><button key={r.n} onClick={()=>{setUserLoc(null);setRegion(r.n)}} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"12px 4px",borderRadius:14,background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.06)",color:"#ccc",transition:"all .25s"}} onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.borderColor="rgba(16,185,129,.3)"}} onMouseLeave={e=>{e.currentTarget.style.transform="";e.currentTarget.style.borderColor="rgba(255,255,255,.06)"}}><span style={{fontSize:16,fontWeight:900}}>{r.n}</span><span style={{fontSize:8,color:"#555"}}>{r.desc}</span></button>)}</div>
  </div></div>;

  const tc={attraction:{c:"#10b981",i:"🏛"},food:{c:"#f59e0b",i:"🍽"},hotel:{c:"#6366f1",i:"🏨"}};
  const locLabel=userLoc&&userLoc.region===region&&userLoc.district?region+' · '+userLoc.district:region;
  return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
    <div style={{position:"sticky",top:0,zIndex:50,background:"rgba(8,10,15,.93)",backdropFilter:"blur(12px)",borderBottom:"1px solid rgba(255,255,255,.04)"}}>
      <div style={{maxWidth:1200,margin:"0 auto",padding:"8px 12px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <h1 style={{fontSize:14,fontWeight:900,cursor:"pointer"}} onClick={()=>{setRegion(null);setUserLoc(null);setView("explore")}}><span style={{color:"#10b981"}}>台灣</span><span style={{color:"#666"}}>旅遊通</span></h1>
          <div style={{position:"relative"}}><button onClick={()=>setPicker(!picker)} style={{display:"flex",alignItems:"center",gap:4,padding:"5px 10px",borderRadius:8,fontSize:11,fontWeight:700,color:"#888",background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.06)"}}><Ico d={I.pin} s={10} c="#10b981"/>{locLabel}<Ico d={I.chevD} s={10}/></button>
            {picker&&<div style={{position:"absolute",top:"100%",left:0,marginTop:4,width:280,padding:8,borderRadius:14,background:"#181b22",border:"1px solid rgba(255,255,255,.08)",boxShadow:"0 12px 40px rgba(0,0,0,.6)",zIndex:60,display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:4}}>{REGIONS.map(r=><button key={r.n} onClick={()=>{setUserLoc(null);setRegion(r.n);setPicker(false);setSearch("");setCat("attraction")}} style={{padding:"8px 4px",borderRadius:8,fontSize:11,fontWeight:700,background:r.n===region?"rgba(16,185,129,.12)":"transparent",color:r.n===region?"#10b981":"#888",border:"none"}}>{r.n}</button>)}</div>}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          {["explore","plan"].map(v=><button key={v} onClick={()=>{setView(v);setPicker(false)}} style={{padding:"5px 14px",borderRadius:8,fontSize:11,fontWeight:700,background:view===v?"#10b981":"transparent",color:view===v?"#fff":"#555",border:"none"}}>{v==="explore"?"探索":"行程"}</button>)}
          <button onClick={()=>{setSidebar(!sidebar);setPicker(false)}} style={{position:"relative",padding:6,borderRadius:8,color:"#555",background:"none",border:"none"}}><Ico d={I.menu} s={18}/>{itin.length>0&&<span style={{position:"absolute",top:-2,right:-2,width:18,height:18,borderRadius:"50%",background:"#10b981",color:"#fff",fontSize:9,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{itin.length}</span>}</button>
        </div>
      </div>
    </div>
    {picker&&<div style={{position:"fixed",inset:0,zIndex:40}} onClick={()=>setPicker(false)}/>}

    <div style={{flex:1,display:"flex",maxWidth:1200,margin:"0 auto",width:"100%",position:"relative"}}>
      <div style={{flex:1,minWidth:0,padding:"12px 12px 40px"}} onClick={()=>setPicker(false)}>
        {view==="explore"&&<div className="fi" style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
            {CATS.map(c=>{const a=cat===c.id;return <button key={c.id} onClick={()=>{setCat(c.id);setSearch("")}} style={{display:"flex",alignItems:"center",gap:5,padding:"8px 14px",borderRadius:10,fontSize:12,fontWeight:700,background:a?c.c+"18":"rgba(255,255,255,.02)",border:"1.5px solid "+(a?c.c+"44":"rgba(255,255,255,.04)"),color:a?c.c:"#6b7280"}}>{c.n}</button>})}
            <button onClick={refresh} style={{padding:6,borderRadius:8,background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",color:"#555",display:"flex",alignItems:"center"}}><Ico d={I.reload} s={14}/></button>
            <span style={{fontSize:9,color:"#444"}}>{loading?'載入中...'+(loadCount>0?' ('+loadCount+'筆)':''):places.length?places.length+' 筆即時資料':""}</span>
          </div>
          <div style={{position:"relative"}}><div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)"}}><Ico d={I.search} s={14} c="#444"/></div><input type="text" placeholder={'搜尋'+locLabel+'...'} value={search} onChange={e=>setSearch(e.target.value)} style={{width:"100%",padding:"10px 12px 10px 36px",borderRadius:10,fontSize:14,color:"#fff",background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",outline:"none"}}/></div>
          {loading?<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:14}}>{[1,2,3,4,5,6].map(i=><Skel key={i}/>)}</div>:filtered.length>0?<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:14}}>{filtered.map(p=><Card key={p.id} p={p} catId={cat} onAdd={add} added={nameSet.has(p.n)} apiKey={apiKey} gm={curT.gm}/>)}</div>:<div style={{textAlign:"center",padding:"48px 0",color:"#555"}}>沒有找到結果</div>}
        </div>}

        {view==="plan"&&<div className="fi" style={{display:"flex",flexDirection:"column",gap:16}}>
          {!plan?<div style={{textAlign:"center",padding:"40px 16px",borderRadius:18,background:"rgba(255,255,255,.01)",border:"1px solid rgba(255,255,255,.04)"}}>
            <div style={{fontSize:40,marginBottom:12}}>🗺️</div><h3 style={{fontSize:20,fontWeight:800,marginBottom:6}}>行程規劃</h3>
            <p style={{fontSize:13,color:"#555",marginBottom:20}}>{itin.length===0?"到「探索」加入地點":'已選 '+itin.length+' 個地點'}</p>
            {itin.length>0&&<><div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,maxWidth:380,margin:"0 auto 20px"}}>{TRANS.map(tr=><button key={tr.id} onClick={()=>setTransport(tr.id)} style={{padding:"12px 8px",borderRadius:12,textAlign:"center",background:transport===tr.id?"rgba(16,185,129,.1)":"rgba(255,255,255,.02)",border:"1.5px solid "+(transport===tr.id?"rgba(16,185,129,.3)":"rgba(255,255,255,.04)"),color:transport===tr.id?"#10b981":"#777"}}><div style={{fontSize:24}}>{tr.e}</div><div style={{fontSize:11,fontWeight:700,marginTop:2}}>{tr.n}</div></button>)}</div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:20}}><div style={{display:"flex",alignItems:"center",borderRadius:10,background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)"}}><button onClick={()=>setDays(Math.max(1,days-1))} style={{padding:"6px 14px",color:"#777",fontWeight:700,fontSize:18,background:"none",border:"none"}}>−</button><span style={{padding:"6px 18px",fontSize:22,fontWeight:900,color:"#10b981"}}>{days}</span><button onClick={()=>setDays(Math.min(7,days+1))} style={{padding:"6px 14px",color:"#777",fontWeight:700,fontSize:18,background:"none",border:"none"}}>+</button></div><span style={{fontSize:13,color:"#666"}}>天</span></div>
            <button onClick={()=>setPlan(mkPlan(itin,days,transport))} style={{padding:"14px 32px",borderRadius:14,fontSize:15,fontWeight:700,color:"#fff",background:"linear-gradient(135deg,#10b981,#0d9488)",border:"none",display:"inline-flex",alignItems:"center",gap:6}}><Ico d={I.zap} s={16} f="white" c="white"/> 產生行程</button></>}
          </div>:<>
            <div style={{textAlign:"center",padding:"16px 0"}}><h2 style={{fontSize:22,fontWeight:900}}>{plan.title}</h2></div>
            {plan.days?.map(day=><div key={day.day} style={{borderRadius:14,overflow:"hidden",background:"rgba(18,20,26,.85)",border:"1px solid rgba(255,255,255,.05)"}}>
              <div style={{display:"flex",alignItems:"center",gap:12,padding:14,borderBottom:"1px solid rgba(255,255,255,.04)"}}><div style={{width:44,height:44,borderRadius:10,background:"linear-gradient(135deg,#10b981,#0d9488)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:18,color:"#fff"}}>{day.day}</div><p style={{fontWeight:700,fontSize:15}}>Day {day.day}</p></div>
              <div style={{padding:14}}>{day.stops?.map((s,i)=>{const cfg=tc[s.type]||tc.attraction;return <div key={i} style={{display:"flex",gap:12,padding:"10px 0"}}>
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",width:40,flexShrink:0}}><span style={{fontSize:9,fontFamily:"monospace",color:"#555",marginBottom:4}}>{s.time}</span><div style={{width:30,height:30,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,background:cfg.c+"12",border:"2px solid "+cfg.c+"33"}}>{cfg.i}</div>{i<day.stops.length-1&&<div style={{width:1,flex:1,marginTop:4,background:cfg.c+"20"}}/>}</div>
                <div style={{flex:1,minWidth:0}}><p style={{fontWeight:700,fontSize:13}}>{s.name}</p><p style={{fontSize:10,color:"#555",marginTop:2}}>⏱ {s.dur}</p>
                  <div style={{display:"flex",gap:4,marginTop:6,flexWrap:"wrap"}}><button className="nav-btn" onClick={()=>openNav(s.name,s.address,plan.gm)} style={{background:"rgba(59,130,246,.12)",color:"#60a5fa",fontSize:9}}><Ico d={I.compass} s={10} c="#60a5fa"/>導航</button>{s.lat&&apiKey&&<button className="nav-btn" onClick={()=>openSV(s.lat,s.lng)} style={{background:"rgba(168,85,247,.1)",color:"#a855f7",fontSize:9}}><Ico d={I.sv} s={10} c="#a855f7"/>街景</button>}{s.mapsUrl&&<button className="nav-btn" onClick={()=>openM(s.mapsUrl)} style={{background:"rgba(255,255,255,.04)",color:"#888",fontSize:9}}><Ico d={I.ext} s={10} c="#888"/>地圖</button>}</div>
                  {s.transport&&<p style={{fontSize:10,color:"#444",marginTop:6,padding:"4px 8px",background:"rgba(255,255,255,.02)",borderRadius:6,display:"inline-block"}}>{s.transport}</p>}
                </div>
              </div>})}</div>
            </div>)}
            <div style={{display:"flex",justifyContent:"center"}}><button onClick={()=>setPlan(null)} style={{display:"flex",alignItems:"center",gap:6,padding:"10px 20px",borderRadius:10,fontSize:12,fontWeight:700,color:"#555",background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)"}}><Ico d={I.rotate} s={12}/>重新規劃</button></div>
          </>}
        </div>}
      </div>

      {sidebar&&<div style={{position:"fixed",inset:0,zIndex:40,background:"rgba(0,0,0,.5)"}} onClick={()=>setSidebar(false)}/>}
      <div style={{display:sidebar?"block":"none",position:"fixed",right:0,top:0,height:"100vh",width:260,background:"#0d0f14",borderLeft:"1px solid rgba(255,255,255,.04)",overflowY:"auto",zIndex:50,padding:14}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}><h2 style={{fontWeight:700,fontSize:13,color:"#888",display:"flex",alignItems:"center",gap:6}}><Ico d={I.map} s={13} c="#10b981"/>我的行程{itin.length>0&&<span style={{fontSize:9,padding:"2px 8px",borderRadius:20,background:"rgba(16,185,129,.12)",color:"#10b981"}}>{itin.length}</span>}</h2><button onClick={()=>setSidebar(false)} style={{padding:4,color:"#555",background:"none",border:"none"}}><Ico d={I.x} s={16}/></button></div>
        {!itin.length?<div style={{textAlign:"center",padding:"40px 0",fontSize:10,color:"#444"}}>到各縣市按「加入」</div>:<div style={{display:"flex",flexDirection:"column",gap:4}}>{itin.map((item,i)=>{const c=CATS.find(x=>x.id===item.category)||CATS[0];return <div key={item.id} style={{display:"flex",alignItems:"center",gap:6,padding:8,borderRadius:10,background:"rgba(255,255,255,.02)"}}>
          <div style={{display:"flex",flexDirection:"column",gap:1}}><button onClick={()=>mv(i,-1)} disabled={!i} style={{color:"#444",opacity:!i?.2:1,padding:0,background:"none",border:"none"}}><Ico d={I.chevU} s={10}/></button><button onClick={()=>mv(i,1)} disabled={i===itin.length-1} style={{color:"#444",opacity:i===itin.length-1?.2:1,padding:0,background:"none",border:"none"}}><Ico d={I.chevD} s={10}/></button></div>
          <div style={{width:22,height:22,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",background:c.c+"15",fontSize:9,fontWeight:700,color:c.c,flexShrink:0}}>{i+1}</div>
          <div style={{flex:1,minWidth:0}}><p style={{fontSize:10,fontWeight:700,color:"#aaa",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.n}</p><p style={{fontSize:8,color:"#444"}}>{item._region} ・ {c.n}</p></div>
          <button onClick={()=>openNav(item.n,item.a,curT.gm)} style={{color:"#60a5fa",padding:2,background:"none",border:"none"}}><Ico d={I.compass} s={11} c="#60a5fa"/></button>
          <button onClick={()=>rm(i)} style={{color:"#333",padding:2,background:"none",border:"none"}}><Ico d={I.trash} s={11}/></button>
        </div>})}</div>}
        {itin.length>0&&<div style={{marginTop:14,display:"flex",flexDirection:"column",gap:8}}><button onClick={()=>{setPlan(mkPlan(itin,days,transport));setView("plan");setSidebar(false)}} style={{width:"100%",padding:12,borderRadius:10,fontSize:12,fontWeight:700,color:"#fff",background:"linear-gradient(135deg,#10b981,#0d9488)",display:"flex",alignItems:"center",justifyContent:"center",gap:6,border:"none"}}><Ico d={I.zap} s={13} f="white" c="white"/>排行程</button><button onClick={()=>setItin([])} style={{width:"100%",padding:6,fontSize:9,color:"#333",background:"none",border:"none"}}>清空全部</button></div>}
      </div>
    </div>
  </div>
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
