<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>診斷</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>body{background:#080a0f;color:#fff;font:14px sans-serif;padding:20px}p{margin:6px 0}.ok{color:#10b981}.fail{color:#ef4444}</style>
</head><body>
<h2>🔧 診斷</h2><div id="log"></div>
<script>
var L=function(m,c){var p=document.createElement('p');p.className=c||'';p.textContent=m;document.getElementById('log').appendChild(p)};
L('1. HTML ✅','ok');
L('2. React: '+(typeof React!=='undefined'?'✅ '+React.version:'❌'),typeof React!=='undefined'?'ok':'fail');
L('3. ReactDOM: '+(typeof ReactDOM!=='undefined'?'✅':'❌'),typeof ReactDOM!=='undefined'?'ok':'fail');
L('4. Babel: '+(typeof Babel!=='undefined'?'✅':'❌'),typeof Babel!=='undefined'?'ok':'fail');
L('5. Firebase: '+(typeof firebase!=='undefined'?'✅ '+firebase.SDK_VERSION:'❌'),typeof firebase!=='undefined'?'ok':'fail');
try{firebase.initializeApp({apiKey:"AIzaSyBvqejbFgYlv27s5b_RQvDI-gkX1trHGjg",authDomain:"taiwan-travel-6effd.firebaseapp.com",projectId:"taiwan-travel-6effd"});L('6. Firebase init ✅','ok');
var auth=firebase.auth(),db=firebase.firestore();
auth.onAuthStateChanged(function(u){L('7. Auth: '+(u?'已登入 '+u.email:'未登入'),'ok');
db.collection("admin").doc("config").get().then(function(d){L('8. Firestore: '+(d.exists?'active='+d.data().active+' key='+(d.data().sharedKey?'有':'無'):'文件不存在'),'ok')}).catch(function(e){L('8. Firestore錯誤: '+e.message,'fail')})});
}catch(e){L('6. Firebase錯誤: '+e.message,'fail')}
try{Babel.transform('const A=()=><b/>;',{presets:['react']});L('9. Babel編譯 ✅','ok')}catch(e){L('9. Babel編譯錯誤: '+e.message,'fail')}
if('serviceWorker'in navigator){navigator.serviceWorker.getRegistrations().then(function(r){L('SW: '+r.length+'個'+(r.length?' (已清除)':''),'ok');r.forEach(function(s){s.unregister()})})}
</script>
</body></html>
