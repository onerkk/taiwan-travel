async function fetchP(key,cLat,cLng,radius,rName,catId,isGeo,onP){
  const ck=cLat.toFixed(3)+','+cLng.toFixed(3)+'-'+catId;if(cache.has(ck))return cache.get(ck);
  const cat=CATS.find(c=>c.id===catId);const hdrs={...HB,'X-Goog-Api-Key':key};const loc={circle:{center:{latitude:cLat,longitude:cLng},radius}};
  const seen=new Set();const all=[];
  const qs=isGeo?cat.queries.map(q=>q).concat(cat.queries.slice(0,3).map(q=>rName+' '+q)):cat.queries.map(q=>rName+' '+q);
  const batches=await Promise.all(qs.map(async q=>{try{const r=await fetch('https://places.googleapis.com/v1/places:searchText',{method:'POST',headers:hdrs,body:JSON.stringify({textQuery:q,maxResultCount:20,languageCode:'zh-TW',locationBias:loc})});if(!r.ok)return[];const d=await r.json();return(d.places||[]).map(p=>parseP(p,catId))}catch(e){return[]}}));
  for(const b of batches){for(const p of b){if(!seen.has(p.id)){seen.add(p.id);all.push(p)}}if(onP)onP(all.length)}
  all.forEach(p=>{p._dist=(p.lat&&p.lng)?hDist(cLat,cLng,p.lat,p.lng):9999});
  cache.set(ck,all);return all;
}

}

    </svg>
    {/* 選中區域 → 展開造訪紀錄 */}
    {sel&&<div className="fi" style={{width:"100%",borderRadius:14,background:"#12141a",border:"1px solid rgba(255,255,255,.06)",overflow:"hidden"}}>
      <div style={{padding:"10px 14px",borderBottom:"1px solid rgba(255,255,255,.04)",display:"flex",alignItems:"center",justifyContent:"space-between"}}><h3 style={{fontSize:16,fontWeight:900}}>{sel} <span style={{fontSize:12,color:"#10b981"}}>{ck?.[sel]||0} 次</span></h3><button onClick={()=>setSel(null)} style={{color:"#555",background:"none",border:"none"}}><Ico d={I.x} s={14}/></button></div>

      </div>)}</div>:<div style={{padding:"20px 14px",textAlign:"center",fontSize:11,color:"#444"}}>{REGIONS.find(r=>r.n===sel)?.desc}<br/>尚未在此打卡</div>}
    </div>}

}

/* ======= APP ======= */
function App(){
  const[region,setRegion]=useState(null);const[cat,setCat]=useState("attraction");const[search,setSearch]=useState("");const[places,setPlaces]=useState([]);const[loading,setLoading]=useState(false);const[loadCount,setLoadCount]=useState(0);const[itin,setItin]=useState([]);const[sidebar,setSidebar]=useState(false);const[days,setDays]=useState(2);const[transport,setTransport]=useState("car");const[plan,setPlan]=useState(null);const[view,setView]=useState("explore");const[picker,setPicker]=useState(false);const[geoLoading,setGeoLoading]=useState(false);const[geoMsg,setGeoMsg]=useState("");const[apiKey]=useState(AK);const[userLoc,setUserLoc]=useState(null);const[sortMode,setSortMode]=useState("dist");
  const[user,setUser]=useState(null);const[checkins,setCheckins]=useState({});const[online,setOnline]=useState([]);const[ckMsg,setCkMsg]=useState("");const[history,setHistory]=useState([]);const[mapTab,setMapTab]=useState("map");/* map | log */

  /* Auth */
  useEffect(()=>{if(!fbOK)return;return auth.onAuthStateChanged(u=>{setUser(u);if(u&&db){db.collection("checkins").doc(u.uid).get().then(d=>{if(d.exists)setCheckins(d.data().regions||{})});db.collection("history").where("uid","==",u.uid).orderBy("ts","desc").limit(200).get().then(snap=>{const l=[];snap.forEach(d=>l.push({id:d.id,...d.data()}));setHistory(l)})}})},[]);
  const signIn=async()=>{if(!fbOK){alert("Firebase 尚未設定");return}try{await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())}catch(e){}};
  const signOut=async()=>{if(auth){if(user&&db)try{await db.collection("online").doc(user.uid).delete()}catch(e){}auth.signOut()}};

  /* Presence */
  useEffect(()=>{if(!fbOK||!user||!db)return;const ref=db.collection("online").doc(user.uid);ref.set({uid:user.uid,name:user.displayName||"旅人",photo:user.photoURL||"",lat:userLoc?.lat||0,lng:userLoc?.lng||0,ts:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});return()=>{ref.delete().catch(()=>{})}},[user]);
  useEffect(()=>{if(user&&db&&userLoc)db.collection("online").doc(user.uid).update({lat:userLoc.lat,lng:userLoc.lng,ts:firebase.firestore.FieldValue.serverTimestamp()}).catch(()=>{})},[userLoc]);
  useEffect(()=>{if(!fbOK||!db)return;const unsub=db.collection("online").onSnapshot(snap=>{const u=[];snap.forEach(d=>{const x=d.data();if(!user||x.uid!==user?.uid)u.push(x)});setOnline(u)});return()=>unsub()},[user]);

  /* 打卡：景點級別，1km 內 */
  const doCheckin=async(place)=>{
    if(!user||!db||!region)return;
    const nc=(checkins[region]||0)+1;const nck={...checkins,[region]:nc};setCheckins(nck);
    try{await db.collection("checkins").doc(user.uid).set({regions:nck},{merge:true})}catch(e){}
    const photoUri=getPhotoUri(place.photos);
    const rec={uid:user.uid,userName:user.displayName||"",userPhoto:user.photoURL||"",region,placeName:place.n,placePhoto:photoUri,placeAddress:place.a||"",lat:place.lat,lng:place.lng,ts:firebase.firestore.FieldValue.serverTimestamp(),companions:[]};
    /* Companion: same region + 1km + 30min */
    const recent=history.filter(h=>h.region===region&&h.uid!==user.uid&&h.ts);
    const pals=[];
    for(const h of recent){if(h.lat&&place.lat&&hDist(h.lat,h.lng,place.lat,place.lng)<1){pals.push({uid:h.uid||"",name:h.userName||""})}}
    if(pals.length){rec.companions=pals;setCkMsg("🎉 "+place.n+" 打卡！與 "+pals.map(p=>p.name).join("、")+" 同行！")}
    else setCkMsg("✅ "+place.n+" 打卡成功！"+region+" 第 "+nc+" 次");
    try{const docRef=await db.collection("history").add(rec);setHistory(prev=>[{id:docRef.id,...rec,ts:new Date()},...prev])}catch(e){}
    setTimeout(()=>setCkMsg(""),4000);
  };

  const totalCk=Object.values(checkins).reduce((a,b)=>a+b,0);
  const visitedN=Object.values(checkins).filter(v=>v>0).length;

  /* Explore */
  useEffect(()=>{if(!region||!apiKey)return;const r=REGIONS.find(x=>x.n===region);if(!r)return;const uL=userLoc&&userLoc.region===region;const cLat=uL?userLoc.lat:r.lat;const cLng=uL?userLoc.lng:r.lng;const rad=uL?15000:(r.rad||15000);setLoading(true);setLoadCount(0);fetchP(apiKey,cLat,cLng,rad,region,cat,uL,n=>setLoadCount(n)).then(d=>{setPlaces(d);setLoading(false)})},[region,cat,apiKey,userLoc]);
  const filtered=(()=>{const f=search?places.filter(p=>p.n.includes(search)||p.d?.includes(search)||p.a?.includes(search)):[...places];if(sortMode==="dist")f.sort((a,b)=>(a._dist||9999)-(b._dist||9999));else f.sort((a,b)=>{const d=(b.r*Math.log10(b.rc+1))-(a.r*Math.log10(a.rc+1));return d||((a._dist||9999)-(b._dist||9999))});return f})();
  const nameSet=new Set(itin.map(i=>i.n));const add=(p,c)=>{if(nameSet.has(p.n))return;setItin(prev=>[...prev,{...p,category:c,_region:region,id:Date.now()}])};const rm=i=>setItin(p=>p.filter((_,x)=>x!==i));const mv=(i,d)=>{const j=i+d;if(j<0||j>=itin.length)return;setItin(p=>{const n=[...p];[n[i],n[j]]=[n[j],n[i]];return n})};const curT=TRANS.find(x=>x.id===transport)||TRANS[0];
  const refresh=()=>{if(!region||!apiKey)return;const r=REGIONS.find(x=>x.n===region);const uL=userLoc&&userLoc.region===region;const cLat=uL?userLoc.lat:r.lat;const cLng=uL?userLoc.lng:r.lng;for(const k of cache.keys())if(k.startsWith(cLat.toFixed(3)))cache.delete(k);const rad=uL?15000:(r.rad||15000);setLoading(true);setLoadCount(0);fetchP(apiKey,cLat,cLng,rad,region,cat,uL,n=>setLoadCount(n)).then(d=>{setPlaces(d);setLoading(false)})};
  const geolocate=()=>{if(!navigator.geolocation){setGeoMsg("不支援定位");return}setGeoLoading(true);setGeoMsg("");navigator.geolocation.getCurrentPosition(async pos=>{const lat=pos.coords.latitude,lng=pos.coords.longitude,acc=pos.coords.accuracy;let district="",found=null;try{const r=await fetch('https://maps.googleapis.com/maps/api/geocode/json?latlng='+lat+','+lng+'&language=zh-TW&key='+apiKey);const d=await r.json();if(d.status==='OK'&&d.results?.length)for(const res of d.results){const comps=res.address_components||[];for(const c of comps)if(!district&&(c.types?.includes("administrative_area_level_3")||c.types?.includes("locality")||c.types?.includes("sublocality_level_1")))district=c.long_name;if(!found)found=matchRegion(comps)}}catch(e){}if(!found){let best=REGIONS[0],min=1e9;REGIONS.forEach(r=>{const d=hDist(lat,lng,r.lat,r.lng);if(d<min){min=d;best=r}});found=best.n}setUserLoc({lat,lng,region:found,district,accuracy:Math.round(acc)});setRegion(found);setGeoLoading(false);setGeoMsg('📍 '+(district?found+' · '+district:found)+'（±'+Math.round(acc)+'m）')},err=>{setGeoLoading(false);setGeoMsg(err.code===1?"請允許定位權限":"定位失敗")},{timeout:15000,enableHighAccuracy:true,maximumAge:0})};
  const mkPlan=(items,nd,tid)=>{const t=TRANS.find(x=>x.id===tid)||TRANS[0];const pd=Math.max(3,Math.ceil(items.length/nd));const ds=[];for(let d=0;d<nd;d++){const ch=items.slice(d*pd,(d+1)*pd);if(!ch.length)continue;const ts=["08:00","09:30","11:00","12:30","14:00","15:30","17:00","18:30"];const stops=ch.map((s,i)=>{let tn="";if(i<ch.length-1){const nx=ch[i+1];if(s.lat&&nx.lat){const km=Math.round(Math.sqrt(Math.pow((nx.lat-s.lat)*111,2)+Math.pow((nx.lng-s.lng)*111*Math.cos(s.lat*Math.PI/180),2)));tn=t.e+' 約'+Math.max(5,Math.round(km/t.spd*60))+'分（'+km+'km）'}}return{time:ts[Math.min(i,7)],name:s.n,address:s.a||"",dur:s.category==="food"?"40-60分":"1-2小時",type:s.category,transport:tn,lat:s.lat,lng:s.lng,mapsUrl:s.mapsUrl}});ds.push({day:d+1,stops})}return{title:nd+'日'+t.n+'旅行',days:ds,gm:t.gm}};
  const tc={attraction:{c:"#10b981",i:"🏛"},food:{c:"#f59e0b",i:"🍽"},hotel:{c:"#6366f1",i:"🏨"}};
  const locLabel=userLoc&&userLoc.region===region&&userLoc.district?region+' · '+userLoc.district:region;

  if(!region)return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",position:"relative"}}><div className="hero-bg"/><div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"20px 16px",position:"relative",zIndex:1}}>
    <div style={{position:"absolute",top:12,right:16}}>{user?<div style={{display:"flex",alignItems:"center",gap:8}}><img src={user.photoURL} style={{width:28,height:28,borderRadius:"50%",border:"2px solid #10b981"}} referrerPolicy="no-referrer"/><button onClick={signOut} style={{padding:"4px 10px",borderRadius:8,fontSize:10,fontWeight:700,color:"#666",background:"rgba(255,255,255,.04)"}}><Ico d={I.logout} s={10}/>登出</button></div>:<button onClick={signIn} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 16px",borderRadius:10,fontSize:12,fontWeight:700,color:"#fff",background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)"}}><Ico d={I.login} s={14}/>Google 登入</button>}</div>
    <div className="fu" style={{textAlign:"center",marginBottom:28}}>
      <div style={{display:"inline-flex",alignItems:"center",gap:6,padding:"6px 14px",borderRadius:20,background:"rgba(16,185,129,.08)",border:"1px solid rgba(16,185,129,.15)",color:"#10b981",fontSize:11,fontWeight:700,marginBottom:20,animation:"float 4s ease-in-out infinite"}}>✨ 即時景點 ・ 1km打卡 ・ 好友同行</div>
      <h1 style={{fontSize:48,fontWeight:900,letterSpacing:-2,lineHeight:1.1}}><span style={{background:"linear-gradient(135deg,#10b981,#14b8a6,#06b6d4)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>台灣</span>旅遊通</h1>
      <p style={{color:"#555",fontSize:14,marginTop:12,lineHeight:1.6}}>即時景點・美食・住宿<br/>景點打卡 ・ 好友定位 ・ 旅遊記錄</p>
      {user&&totalCk>0&&<p style={{fontSize:12,color:"#10b981",marginTop:8}}>🏆 {totalCk} 次打卡 ・ {visitedN}/{REGIONS.length} 縣市 ・ {history.length} 個景點</p>}
    </div>
    <button className="fu" onClick={geolocate} disabled={geoLoading} style={{animationDelay:".12s",display:"flex",alignItems:"center",gap:8,padding:"14px 28px",borderRadius:16,background:"linear-gradient(135deg,#10b981,#0d9488)",color:"#fff",fontSize:15,fontWeight:700,boxShadow:"0 8px 32px rgba(16,185,129,.25)",marginBottom:8,animation:"glow 3s ease-in-out infinite"}}>{geoLoading?<span style={{width:18,height:18,border:"2.5px solid rgba(255,255,255,.3)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>:<Ico d={I.nav} s={18} f="white" c="white"/>}{geoLoading?"定位中...":"📍 使用目前位置"}</button>
    {geoMsg&&<p className="fi" style={{fontSize:12,color:geoMsg.includes("📍")?"#10b981":"#f59e0b",marginBottom:8}}>{geoMsg}</p>}
    <p className="fu" style={{animationDelay:".2s",fontSize:11,color:"#444",letterSpacing:3,marginTop:16,marginBottom:12}}>或選擇目的地</p>
    <div className="fu" style={{animationDelay:".25s",display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,maxWidth:440,width:"100%"}}>{REGIONS.map(r=><button key={r.n} onClick={()=>{setUserLoc(null);setRegion(r.n)}} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"12px 4px",borderRadius:14,background:checkins[r.n]?"rgba(16,185,129,.06)":"rgba(255,255,255,.02)",border:"1px solid "+(checkins[r.n]?"rgba(16,185,129,.15)":"rgba(255,255,255,.06)"),color:"#ccc",transition:"all .25s",position:"relative"}} onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)"}} onMouseLeave={e=>{e.currentTarget.style.transform=""}}><span style={{fontSize:16,fontWeight:900}}>{r.n}</span><span style={{fontSize:8,color:"#555"}}>{r.desc}</span>{checkins[r.n]>0&&<span style={{position:"absolute",top:-4,right:-4,width:16,height:16,borderRadius:"50%",background:"#10b981",color:"#fff",fontSize:8,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{checkins[r.n]}</span>}</button>)}</div>
  </div></div>;

  return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
    {ckMsg&&<div className="fi" style={{position:"fixed",top:56,left:"50%",transform:"translateX(-50%)",zIndex:100,padding:"12px 24px",borderRadius:14,background:"#12141a",border:"1px solid rgba(16,185,129,.3)",boxShadow:"0 8px 32px rgba(0,0,0,.5)",fontSize:13,fontWeight:700,color:"#10b981",whiteSpace:"nowrap",maxWidth:"90vw",overflow:"hidden",textOverflow:"ellipsis"}}>{ckMsg}</div>}
    <div style={{position:"sticky",top:0,zIndex:50,background:"rgba(8,10,15,.93)",backdropFilter:"blur(12px)",borderBottom:"1px solid rgba(255,255,255,.04)"}}>
      <div style={{maxWidth:1200,margin:"0 auto",padding:"8px 12px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <h1 style={{fontSize:14,fontWeight:900,cursor:"pointer"}} onClick={()=>{setRegion(null);setUserLoc(null);setView("explore")}}><span style={{color:"#10b981"}}>台灣</span><span style={{color:"#666"}}>旅遊通</span></h1>
          <div style={{position:"relative"}}><button onClick={()=>setPicker(!picker)} style={{display:"flex",alignItems:"center",gap:4,padding:"5px 10px",borderRadius:8,fontSize:11,fontWeight:700,color:"#888",background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.06)"}}><Ico d={I.pin} s={10} c="#10b981"/>{locLabel}<Ico d={I.chevD} s={10}/></button>
            {picker&&<div style={{position:"absolute",top:"100%",left:0,marginTop:4,width:280,padding:8,borderRadius:14,background:"#181b22",border:"1px solid rgba(255,255,255,.08)",boxShadow:"0 12px 40px rgba(0,0,0,.6)",zIndex:60,display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:4}}>{REGIONS.map(r=><button key={r.n} onClick={()=>{setUserLoc(null);setRegion(r.n);setPicker(false);setSearch("");setCat("attraction")}} style={{padding:"8px 4px",borderRadius:8,fontSize:11,fontWeight:700,background:r.n===region?"rgba(16,185,129,.12)":"transparent",color:r.n===region?"#10b981":"#888",border:"none"}}>{r.n}</button>)}</div>}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          {["explore","map","plan"].map(v=><button key={v} onClick={()=>{setView(v);setPicker(false)}} style={{padding:"5px 12px",borderRadius:8,fontSize:11,fontWeight:700,background:view===v?"#10b981":"transparent",color:view===v?"#fff":"#555",border:"none"}}>{v==="explore"?"探索":v==="map"?"地圖":"行程"}</button>)}
          {user?<img src={user.photoURL} onClick={signOut} style={{width:24,height:24,borderRadius:"50%",border:"1.5px solid #10b981",cursor:"pointer",marginLeft:4}} referrerPolicy="no-referrer" title="登出"/>:<button onClick={signIn} style={{padding:"4px 8px",borderRadius:6,fontSize:9,fontWeight:700,color:"#10b981",background:"rgba(16,185,129,.08)",border:"1px solid rgba(16,185,129,.15)",marginLeft:4}}>登入</button>}
          <button onClick={()=>{setSidebar(!sidebar);setPicker(false)}} style={{position:"relative",padding:6,borderRadius:8,color:"#555",background:"none",border:"none"}}><Ico d={I.menu} s={18}/>{itin.length>0&&<span style={{position:"absolute",top:-2,right:-2,width:18,height:18,borderRadius:"50%",background:"#10b981",color:"#fff",fontSize:9,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{itin.length}</span>}</button>
        </div>
      </div>
    </div>
    {picker&&<div style={{position:"fixed",inset:0,zIndex:40}} onClick={()=>setPicker(false)}/>}
    <div style={{flex:1,display:"flex",maxWidth:1200,margin:"0 auto",width:"100%",position:"relative"}}>
      <div style={{flex:1,minWidth:0,padding:"12px 12px 40px"}} onClick={()=>setPicker(false)}>

        {view==="explore"&&<div className="fi" style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
            {CATS.map(c=>{const a=cat===c.id;return <button key={c.id} onClick={()=>{setCat(c.id);setSearch("")}} style={{display:"flex",alignItems:"center",gap:5,padding:"8px 14px",borderRadius:10,fontSize:12,fontWeight:700,background:a?c.c+"18":"rgba(255,255,255,.02)",border:"1.5px solid "+(a?c.c+"44":"rgba(255,255,255,.04)"),color:a?c.c:"#6b7280"}}>{c.n}</button>})}
            <button onClick={refresh} style={{padding:6,borderRadius:8,background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",color:"#555",display:"flex",alignItems:"center"}}><Ico d={I.reload} s={14}/></button>
            <div style={{flex:1}}/>
            {[{id:"dist",label:"📍 最近"},{id:"rating",label:"⭐ 評分"}].map(s=><button key={s.id} onClick={()=>setSortMode(s.id)} style={{padding:"5px 10px",borderRadius:8,fontSize:10,fontWeight:700,background:sortMode===s.id?"rgba(16,185,129,.12)":"rgba(255,255,255,.02)",border:"1px solid "+(sortMode===s.id?"rgba(16,185,129,.3)":"rgba(255,255,255,.06)"),color:sortMode===s.id?"#10b981":"#666"}}>{s.label}</button>)}
            <span style={{fontSize:9,color:"#444"}}>{loading?'載入中...'+(loadCount>0?' ('+loadCount+'筆)':''):places.length?places.length+'筆':""}</span>
          </div>
          <div style={{position:"relative"}}><div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)"}}><Ico d={I.search} s={14} c="#444"/></div><input type="text" placeholder={'搜尋'+(locLabel||'')+'...'} value={search} onChange={e=>setSearch(e.target.value)} style={{width:"100%",padding:"10px 12px 10px 36px",borderRadius:10,fontSize:14,color:"#fff",background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",outline:"none"}}/></div>
          {loading?<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:14}}>{[1,2,3,4,5,6].map(i=><Skel key={i}/>)}</div>:filtered.length>0?<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:14}}>{filtered.map(p=><Card key={p.id} p={p} catId={cat} onAdd={add} added={nameSet.has(p.n)} apiKey={apiKey} gm={curT.gm} onCk={doCheckin} user={user} ckDist={p._dist}/>)}</div>:<div style={{textAlign:"center",padding:"48px 0",color:"#555"}}>沒有找到結果</div>}
        </div>}

        {view==="map"&&<div className="fi" style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={{textAlign:"center"}}><h2 style={{fontSize:20,fontWeight:900,marginBottom:4}}>🗺️ 台灣打卡地圖</h2>{user&&<p style={{fontSize:11,color:"#666"}}>{user.displayName} ・ {visitedN}/{REGIONS.length} 縣市 ・ {history.length} 景點</p>}{!user&&<p style={{fontSize:11,color:"#f59e0b"}}>登入即可打卡</p>}{online.length>0&&<p style={{fontSize:10,color:"#10b981",marginTop:4}}><Ico d={I.users} s={10} c="#10b981"/> {online.length} 位旅人在線</p>}</div>
          {/* 地圖/記錄 切換 */}
          <div style={{display:"flex",gap:6,justifyContent:"center"}}>{[{id:"map",label:"🗺️ 地圖"},{id:"log",label:"📋 旅遊記錄"}].map(t=><button key={t.id} onClick={()=>setMapTab(t.id)} style={{padding:"6px 16px",borderRadius:8,fontSize:12,fontWeight:700,background:mapTab===t.id?"rgba(16,185,129,.12)":"rgba(255,255,255,.02)",border:"1px solid "+(mapTab===t.id?"rgba(16,185,129,.3)":"rgba(255,255,255,.06)"),color:mapTab===t.id?"#10b981":"#666"}}>{t.label}</button>)}</div>
          {mapTab==="map"&&<TaiwanMap ck={checkins} online={online} me={user} geo={userLoc} history={history}/>}
          {mapTab==="log"&&<div className="fi" style={{display:"flex",flexDirection:"column",gap:2}}>
            {history.length===0?<div style={{textAlign:"center",padding:"40px 0",color:"#444",fontSize:12}}>到「探索」找景點，1km 內即可打卡</div>:history.map((h,i)=><div key={h.id||i} className="ci" style={{display:"flex",gap:10,padding:12,borderRadius:12,background:"#12141a",border:"1px solid rgba(255,255,255,.03)"}}>
              <div style={{width:56,height:56,borderRadius:10,overflow:"hidden",flexShrink:0,background:"#1a1d24"}}>{h.placePhoto?<img src={h.placePhoto} style={{width:"100%",height:"100%",objectFit:"cover"}} referrerPolicy="no-referrer"/>:<div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>📍</div>}</div>
              <div style={{flex:1,minWidth:0}}>
                <p style={{fontSize:13,fontWeight:700,color:"#ddd",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.placeName}</p>
                <p style={{fontSize:9,color:"#555",marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.placeAddress}</p>
                <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4}}>
                  <span style={{fontSize:9,color:"#10b981",fontWeight:700}}>{h.region}</span>
                  <span style={{fontSize:9,color:"#444"}}><Ico d={I.clock} s={8} c="#444"/> {fmtDate(h.ts)}</span>
                </div>
                {h.companions?.length>0&&<p style={{fontSize:9,color:"#f59e0b",marginTop:2}}>👥 與{h.companions.map(c=>c.name).join("、")}同行</p>}
              </div>
            </div>)}
          </div>}
        </div>}

        {view==="plan"&&<div className="fi" style={{display:"flex",flexDirection:"column",gap:16}}>
          {!plan?<div style={{textAlign:"center",padding:"40px 16px",borderRadius:18,background:"rgba(255,255,255,.01)",border:"1px solid rgba(255,255,255,.04)"}}><div style={{fontSize:40,marginBottom:12}}>🗺️</div><h3 style={{fontSize:20,fontWeight:800,marginBottom:6}}>行程規劃</h3><p style={{fontSize:13,color:"#555",marginBottom:20}}>{itin.length===0?"到「探索」加入地點":'已選 '+itin.length+' 個地點'}</p>
            {itin.length>0&&<><div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,maxWidth:380,margin:"0 auto 20px"}}>{TRANS.map(tr=><button key={tr.id} onClick={()=>setTransport(tr.id)} style={{padding:"12px 8px",borderRadius:12,textAlign:"center",background:transport===tr.id?"rgba(16,185,129,.1)":"rgba(255,255,255,.02)",border:"1.5px solid "+(transport===tr.id?"rgba(16,185,129,.3)":"rgba(255,255,255,.04)"),color:transport===tr.id?"#10b981":"#777"}}><div style={{fontSize:24}}>{tr.e}</div><div style={{fontSize:11,fontWeight:700,marginTop:2}}>{tr.n}</div></button>)}</div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:20}}><div style={{display:"flex",alignItems:"center",borderRadius:10,background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)"}}><button onClick={()=>setDays(Math.max(1,days-1))} style={{padding:"6px 14px",color:"#777",fontWeight:700,fontSize:18,background:"none",border:"none"}}>−</button><span style={{padding:"6px 18px",fontSize:22,fontWeight:900,color:"#10b981"}}>{days}</span><button onClick={()=>setDays(Math.min(7,days+1))} style={{padding:"6px 14px",color:"#777",fontWeight:700,fontSize:18,background:"none",border:"none"}}>+</button></div><span style={{fontSize:13,color:"#666"}}>天</span></div>
            <button onClick={()=>setPlan(mkPlan(itin,days,transport))} style={{padding:"14px 32px",borderRadius:14,fontSize:15,fontWeight:700,color:"#fff",background:"linear-gradient(135deg,#10b981,#0d9488)",border:"none",display:"inline-flex",alignItems:"center",gap:6}}><Ico d={I.zap} s={16} f="white" c="white"/> 產生行程</button></>}
          </div>:<>
            <div style={{textAlign:"center",padding:"16px 0"}}><h2 style={{fontSize:22,fontWeight:900}}>{plan.title}</h2></div>
            {plan.days?.map(day=><div key={day.day} style={{borderRadius:14,overflow:"hidden",background:"rgba(18,20,26,.85)",border:"1px solid rgba(255,255,255,.05)"}}>
              <div style={{display:"flex",alignItems:"center",gap:12,padding:14,borderBottom:"1px solid rgba(255,255,255,.04)"}}><div style={{width:44,height:44,borderRadius:10,background:"linear-gradient(135deg,#10b981,#0d9488)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:18,color:"#fff"}}>{day.day}</div><p style={{fontWeight:700,fontSize:15}}>Day {day.day}</p></div>
              <div style={{padding:14}}>{day.stops?.map((s,i)=>{const cfg=tc[s.type]||tc.attraction;return <div key={i} style={{display:"flex",gap:12,padding:"10px 0"}}><div style={{display:"flex",flexDirection:"column",alignItems:"center",width:40,flexShrink:0}}><span style={{fontSize:9,fontFamily:"monospace",color:"#555",marginBottom:4}}>{s.time}</span><div style={{width:30,height:30,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,background:cfg.c+"12",border:"2px solid "+cfg.c+"33"}}>{cfg.i}</div>{i<day.stops.length-1&&<div style={{width:1,flex:1,marginTop:4,background:cfg.c+"20"}}/>}</div><div style={{flex:1,minWidth:0}}><p style={{fontWeight:700,fontSize:13}}>{s.name}</p><p style={{fontSize:10,color:"#555",marginTop:2}}>⏱ {s.dur}</p><div style={{display:"flex",gap:4,marginTop:6,flexWrap:"wrap"}}><button className="nav-btn" onClick={()=>openNav(s.name,s.address,plan.gm)} style={{background:"rgba(59,130,246,.12)",color:"#60a5fa",fontSize:9}}><Ico d={I.compass} s={10} c="#60a5fa"/>導航</button>{s.lat&&<button className="nav-btn" onClick={()=>openSV(s.lat,s.lng)} style={{background:"rgba(168,85,247,.1)",color:"#a855f7",fontSize:9}}><Ico d={I.sv} s={10} c="#a855f7"/>街景</button>}</div>{s.transport&&<p style={{fontSize:10,color:"#444",marginTop:6,padding:"4px 8px",background:"rgba(255,255,255,.02)",borderRadius:6,display:"inline-block"}}>{s.transport}</p>}</div></div>})}</div>
            </div>)}
            <div style={{display:"flex",justifyContent:"center"}}><button onClick={()=>setPlan(null)} style={{display:"flex",alignItems:"center",gap:6,padding:"10px 20px",borderRadius:10,fontSize:12,fontWeight:700,color:"#555",background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)"}}><Ico d={I.rotate} s={12}/>重新規劃</button></div>
          </>}
        </div>}
      </div>

      {sidebar&&<div style={{position:"fixed",inset:0,zIndex:40,background:"rgba(0,0,0,.5)"}} onClick={()=>setSidebar(false)}/>}
      <div style={{display:sidebar?"block":"none",position:"fixed",right:0,top:0,height:"100vh",width:260,background:"#0d0f14",borderLeft:"1px solid rgba(255,255,255,.04)",overflowY:"auto",zIndex:50,padding:14}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}><h2 style={{fontWeight:700,fontSize:13,color:"#888",display:"flex",alignItems:"center",gap:6}}><Ico d={I.map} s={13} c="#10b981"/>我的行程{itin.length>0&&<span style={{fontSize:9,padding:"2px 8px",borderRadius:20,background:"rgba(16,185,129,.12)",color:"#10b981"}}>{itin.length}</span>}</h2><button onClick={()=>setSidebar(false)} style={{padding:4,color:"#555",background:"none",border:"none"}}><Ico d={I.x} s={16}/></button></div>
        {!itin.length?<div style={{textAlign:"center",padding:"40px 0",fontSize:10,color:"#444"}}>到各縣市按「加入」</div>:<div style={{display:"flex",flexDirection:"column",gap:4}}>{itin.map((item,i)=>{const c=CATS.find(x=>x.id===item.category)||CATS[0];return <div key={item.id} style={{display:"flex",alignItems:"center",gap:6,padding:8,borderRadius:10,background:"rgba(255,255,255,.02)"}}><div style={{display:"flex",flexDirection:"column",gap:1}}><button onClick={()=>mv(i,-1)} disabled={!i} style={{color:"#444",opacity:!i?.2:1,padding:0,background:"none",border:"none"}}><Ico d={I.chevU} s={10}/></button><button onClick={()=>mv(i,1)} disabled={i===itin.length-1} style={{color:"#444",opacity:i===itin.length-1?.2:1,padding:0,background:"none",border:"none"}}><Ico d={I.chevD} s={10}/></button></div><div style={{width:22,height:22,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",background:c.c+"15",fontSize:9,fontWeight:700,color:c.c,flexShrink:0}}>{i+1}</div><div style={{flex:1,minWidth:0}}><p style={{fontSize:10,fontWeight:700,color:"#aaa",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.n}</p><p style={{fontSize:8,color:"#444"}}>{item._region} ・ {c.n}</p></div><button onClick={()=>openNav(item.n,item.a,curT.gm)} style={{color:"#60a5fa",padding:2,background:"none",border:"none"}}><Ico d={I.compass} s={11} c="#60a5fa"/></button><button onClick={()=>rm(i)} style={{color:"#333",padding:2,background:"none",border:"none"}}><Ico d={I.trash} s={11}/></button></div>})}</div>}
        {itin.length>0&&<div style={{marginTop:14,display:"flex",flexDirection:"column",gap:8}}><button onClick={()=>{setPlan(mkPlan(itin,days,transport));setView("plan");setSidebar(false)}} style={{width:"100%",padding:12,borderRadius:10,fontSize:12,fontWeight:700,color:"#fff",background:"linear-gradient(135deg,#10b981,#0d9488)",display:"flex",alignItems:"center",justifyContent:"center",gap:6,border:"none"}}><Ico d={I.zap} s={13} f="white" c="white"/>排行程</button><button onClick={()=>setItin([])} style={{width:"100%",padding:6,fontSize:9,color:"#333",background:"none",border:"none"}}>清空全部</button></div>}
      </div>
    </div>
  </div>
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
