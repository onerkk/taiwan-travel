/* ═══ GOOGLE PLACES PHOTO ═══ */
function Photo({name,regionName,catName,apiKey,gq}){
  const[src,setSrc]=useState(null);
  const[loaded,setLoaded]=useState(false);
  const[loading,setLoading]=useState(false);
  const tried=useRef(false);

  useEffect(()=>{
    if(tried.current)return;tried.current=true;
    const cacheKey=gq||`${name} ${regionName} Taiwan`;
    if(photoCache.has(cacheKey)){const c=photoCache.get(cacheKey);if(c)setSrc(c);return}
    if(inflightRequests.has(cacheKey)){inflightRequests.get(cacheKey).then(u=>{if(u)setSrc(u)});return}
    if(!apiKey)return;
    setLoading(true);
    const query=gq||`${name} ${regionName} 台灣`;
    const promise=(async()=>{
      try{
        const res=await fetch('https://places.googleapis.com/v1/places:searchText',{
          method:'POST',headers:{'Content-Type':'application/json','X-Goog-Api-Key':apiKey,'X-Goog-FieldMask':'places.photos,places.displayName,places.location,places.id'},
          body:JSON.stringify({textQuery:query,maxResultCount:1,languageCode:'zh-TW'})
        });
        if(!res.ok){photoCache.set(cacheKey,null);setLoading(false);return null}
        const data=await res.json();
        const place=data?.places?.[0];
        if(place){
          if(place.location)placeCache.set(cacheKey,{lat:place.location.latitude,lng:place.location.longitude,placeId:place.id});
          const photos=place.photos;
          if(photos?.length>0){
            const photoRef=photos[0].name;
            const photoUrl=`https://places.googleapis.com/v1/${photoRef}/media?maxHeightPx=400&maxWidthPx=640&key=${apiKey}&skipHttpRedirect=true`;
            const photoRes=await fetch(photoUrl);
            if(photoRes.ok){const pd=await photoRes.json();if(pd.photoUri){photoCache.set(cacheKey,pd.photoUri);setSrc(pd.photoUri);setLoading(false);return pd.photoUri}}
            const directUrl=`https://places.googleapis.com/v1/${photoRef}/media?maxHeightPx=400&maxWidthPx=640&key=${apiKey}`;
            photoCache.set(cacheKey,directUrl);setSrc(directUrl);setLoading(false);return directUrl;
          }
        }
        photoCache.set(cacheKey,null);setLoading(false);return null;
      }catch(e){photoCache.set(cacheKey,null);setLoading(false);return null}
    })();
    inflightRequests.set(cacheKey,promise);
    promise.finally(()=>inflightRequests.delete(cacheKey));
  },[apiKey]);

  const gradients=["linear-gradient(135deg,#0c4a6e,#155e75,#083344)","linear-gradient(135deg,#7c2d12,#92400e,#78350f)","linear-gradient(135deg,#3730a3,#4338ca,#312e81)","linear-gradient(135deg,#166534,#15803d,#064e3b)","linear-gradient(135deg,#831843,#9d174d,#701a3e)"];
  const hv=(name||"").split("").reduce((a,c)=>a+c.charCodeAt(0),0);
  return(
    <div style={{position:"relative",width:"100%",height:"100%",background:gradients[hv%gradients.length],display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
      <div style={{position:"absolute",inset:0,opacity:.04,backgroundImage:"repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(255,255,255,1) 20px,rgba(255,255,255,1) 21px)"}}/>
      {loading&&!src&&<div className="shimmer-bg" style={{position:"absolute",inset:0}}/>}
      <span style={{fontSize:"1.6rem",fontWeight:900,color:"rgba(255,255,255,.08)",position:"relative",letterSpacing:2}}>{(name||"").slice(0,4)}</span>
      {!apiKey&&<div style={{position:"absolute",bottom:6,left:0,right:0,textAlign:"center"}}><span style={{fontSize:8,color:"rgba(255,255,255,.2)",padding:"2px 6px",borderRadius:4,background:"rgba(0,0,0,.3)"}}>需要 API Key</span></div>}
      {src&&<img className={`ph${loaded?" loaded":""}`} src={src} alt={name} onLoad={()=>setLoaded(true)} onError={()=>{setSrc(null);setLoaded(false)}} loading="lazy" referrerPolicy="no-referrer"/>}
    </div>
  );
}

/* ═══ SMART PLANNER ═══ */
function smartPlan(items,numDays,tid){
  const t=TRANS.find(x=>x.id===tid)||TRANS[0];
  const byR={};items.forEach(it=>{const r=it._region;if(!byR[r])byR[r]=[];byR[r].push(it)});
  const all=[];
  Object.entries(byR).forEach(([reg,group])=>{
    const att=group.filter(g=>g.category==="attraction"),fd=group.filter(g=>g.category==="food"),ht=group.filter(g=>g.category==="hotel");
    if(fd.length>0)all.push({...fd[0],_reg:reg});
    att.forEach(a=>all.push({...a,_reg:reg}));
    fd.slice(1).forEach(f=>all.push({...f,_reg:reg}));
    ht.forEach(h=>all.push({...h,_reg:reg}));
  });
  const perDay=Math.max(3,Math.ceil(all.length/numDays));
  const days=[];
  for(let d=0;d<numDays;d++){
    const chunk=all.slice(d*perDay,(d+1)*perDay);if(!chunk.length)continue;
    const times=["08:00","09:30","11:00","12:00","13:30","15:00","16:30","18:00","19:30"];
    const stops=chunk.map((s,i)=>{
      let tn="",tMin=0;
      if(i<chunk.length-1){
        const nx=chunk[i+1];const same=nx._reg===s._reg;
        if(same){const km=5+Math.floor(Math.random()*15);tMin=Math.max(5,Math.round(km/t.spd*60));tn=`${t.e} ${t.n} 約${tMin}分（${km}km）`}
        else{const km=50+Math.floor(Math.random()*100);tMin=Math.round(km/t.spd*60);tn=tid==="train"?`🚄 搭高鐵/台鐵往${nx._reg}（約${tMin}分）`:tid==="bus"?`🚌 搭客運往${nx._reg}（約${tMin}分）`:`${t.e} ${t.n}往${nx._reg}（約${tMin}分/${km}km）`}
      }
      return{time:times[Math.min(i,8)],name:s.n,address:s.a||"",dur:s.category==="food"?"40-60分":"1-2小時",note:s.tip||"",type:s.category,transport:tn,transportMin:tMin,reg:s._reg,gq:s.gq||""};
    });
    days.push({day:d+1,theme:`${chunk[0]._reg}${chunk.length>3?"深度遊":"探索"}`,stops});
  }
  const regs=[...new Set(items.map(i=>i._region))];
  const tips=[`交通方式：${t.e} ${t.n}（${t.note}）`];
  if(regs.length>1)tips.push("跨縣市建議搭高鐵或提前規劃轉乘路線");
  tips.push("提前預訂熱門景點門票和餐廳","注意各景點營業時間和公休日");
  return{title:`${regs.join(" → ")} ${numDays}日${t.n}旅行`,days,tips,transportId:tid,transportGm:t.gm};
}

      {plan.tips.map((t,i)=><p key={i} style={{fontSize:11,color:"rgba(245,158,11,.35)",marginBottom:4}}>• {t}</p>)}
    </div>}
  </div>);
}

/* ═══ MAIN APP ═══ */
function App(){
  const[region,setRegion]=useState(null);
  const[cat,setCat]=useState("attraction");
  const[search,setSearch]=useState("");
  const[itin,setItin]=useState([]);
  const[sidebar,setSidebar]=useState(false);
  const[days,setDays]=useState(2);
  const[transport,setTransport]=useState("car");
  const[plan,setPlan]=useState(null);
  const[view,setView]=useState("explore");
  const[picker,setPicker]=useState(false);
  const[geoLoading,setGeoLoading]=useState(false);
  const[geoMsg,setGeoMsg]=useState("");
  const[apiKey,setApiKey]=useState("AIzaSyDAs-_AJ8ZEaR062P0-YlzdzawYEZzObbg");
  const[showKey,setShowKey]=useState(false);
  const[keyInput,setKeyInput]=useState("AIzaSyDAs-_AJ8ZEaR062P0-YlzdzawYEZzObbg");
  const[apiStatus,setApiStatus]=useState('ok');

  // ═══ LOAD API KEY FROM PERSISTENT STORAGE ═══
  useEffect(()=>{
    (async()=>{
      try{
        const r=await window.storage.get('gapi-key');
        if(r&&r.value){setApiKey(r.value);setKeyInput(r.value);setApiStatus('ok')}
      }catch(e){}
    })();
  },[]);

  const testAndSetKey=async(key)=>{
    if(!key.trim()){setApiStatus('error');return}
    setApiStatus('testing');
    try{
      const res=await fetch('https://places.googleapis.com/v1/places:searchText',{
        method:'POST',headers:{'Content-Type':'application/json','X-Goog-Api-Key':key.trim(),'X-Goog-FieldMask':'places.displayName'},
        body:JSON.stringify({textQuery:'Taipei 101',maxResultCount:1})
      });
      if(res.ok){
        setApiKey(key.trim());setApiStatus('ok');photoCache.clear();
        try{await window.storage.set('gapi-key',key.trim())}catch(e){}
      }else{setApiStatus('error')}
    }catch{setApiStatus('error')}
  };

  const data=region?(DB[region]?.[cat]||[]):[];
  const filtered=search?data.filter(p=>p.n.includes(search)||p.d.includes(search)||p.t?.some(x=>x.includes(search))):data;
  const nameSet=new Set(itin.map(i=>i.n));
  const add=(p,c)=>{if(nameSet.has(p.n))return;setItin(prev=>[...prev,{...p,category:c,_region:region,id:Date.now()}])};
  const rm=i=>setItin(p=>p.filter((_,x)=>x!==i));
  const mv=(i,d)=>{const j=i+d;if(j<0||j>=itin.length)return;setItin(p=>{const n=[...p];[n[i],n[j]]=[n[j],n[i]];return n})};
  const curTrans=TRANS.find(x=>x.id===transport)||TRANS[0];

  const geolocate=()=>{
    if(!navigator.geolocation){setGeoMsg("此裝置不支援定位");return}
    setGeoLoading(true);setGeoMsg("");
    navigator.geolocation.getCurrentPosition(
      pos=>{let best=REGIONS[0],min=1e9;REGIONS.forEach(r=>{const d=Math.hypot(r.lat-pos.coords.latitude,r.lng-pos.coords.longitude);if(d<min){min=d;best=r}});setRegion(best.n);setGeoLoading(false);setGeoMsg(`已定位到 ${best.n} 附近`)},
      err=>{setGeoLoading(false);setGeoMsg(err.code===1?"請允許定位權限":"定位失敗，請手動選擇")},
      {timeout:10000,enableHighAccuracy:false}
    );
  };

  const totalPlaces=Object.values(DB).reduce((sum,r)=>sum+Object.values(r).flat().length,0);

  /* ═══ LANDING ═══ */
  if(!region)return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",position:"relative"}}>
      <div className="hero-bg"/>
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"20px 16px",position:"relative",zIndex:1}}>
        <div className="fu" style={{textAlign:"center",marginBottom:28}}>
          <div style={{display:"inline-flex",alignItems:"center",gap:6,padding:"6px 14px",borderRadius:20,background:"rgba(16,185,129,.08)",border:"1px solid rgba(16,185,129,.15)",color:"#10b981",fontSize:11,fontWeight:700,marginBottom:20,animation:"float 4s ease-in-out infinite"}}>
            ✨ {totalPlaces}+ 景點 ・ Google 實景照片 ・ 導航 ・ 街景
          </div>
          <h1 style={{fontSize:48,fontWeight:900,letterSpacing:-2,lineHeight:1.1}}>
            <span style={{background:"linear-gradient(135deg,#10b981,#14b8a6,#06b6d4)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>台灣</span>旅遊通
          </h1>
          <p style={{color:"#555",fontSize:14,marginTop:12,lineHeight:1.6}}>Google Places 實景照片 ・ 一鍵導航 ・ 街景預覽 ・ 智慧排程</p>
        </div>

        {/* API Key */}
        <div className="fu" style={{animationDelay:".05s",width:"100%",maxWidth:440,marginBottom:20}}>
          <div style={{borderRadius:16,padding:16,background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.06)"}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
              <SvgIcon path={ICO.key} size={14} color="#10b981"/>
              <span style={{fontSize:12,fontWeight:700,color:"#888"}}>Google Places API Key</span>
              {apiStatus==='ok'&&<span style={{fontSize:9,padding:"2px 8px",borderRadius:20,background:"rgba(16,185,129,.12)",color:"#10b981",fontWeight:700}}>✓ 已儲存</span>}
            </div>
            <div style={{display:"flex",gap:6}}>
              <div style={{flex:1,position:"relative"}}>
                <input type={showKey?"text":"password"} placeholder="貼上 API Key..." value={keyInput} onChange={e=>setKeyInput(e.target.value)}
                  onKeyDown={e=>{if(e.key==='Enter')testAndSetKey(keyInput)}}
                  style={{width:"100%",padding:"10px 36px 10px 12px",borderRadius:10,fontSize:13,color:"#fff",background:"rgba(255,255,255,.04)",border:`1px solid ${apiStatus==='error'?'rgba(239,68,68,.3)':'rgba(255,255,255,.08)'}`,outline:"none"}}/>
                <button onClick={()=>setShowKey(!showKey)} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",padding:4,color:"#555",background:"none",border:"none"}}>
                  <SvgIcon path={showKey?ICO.eyeOff:ICO.eye} size={14}/>
                </button>
              </div>
              <button onClick={()=>testAndSetKey(keyInput)}
                style={{padding:"0 16px",borderRadius:10,fontSize:12,fontWeight:700,background:apiStatus==='testing'?"rgba(255,255,255,.04)":"rgba(16,185,129,.15)",color:apiStatus==='testing'?"#555":"#10b981",border:"1px solid rgba(16,185,129,.2)",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:4}}>
                {apiStatus==='testing'?<span style={{width:12,height:12,border:"2px solid rgba(16,185,129,.3)",borderTopColor:"#10b981",borderRadius:"50%",animation:"spin .8s linear infinite"}}/>:null}
                {apiStatus==='testing'?'驗證中':'儲存'}
              </button>
            </div>
            {apiStatus==='error'&&<p style={{fontSize:10,color:"#ef4444",marginTop:6}}>API Key 無效或 Places API (New) 未啟用</p>}
            <p style={{fontSize:9,color:"#444",marginTop:8,lineHeight:1.5}}>
              需啟用 Places API (New) + Street View Static API。到 <a href="https://console.cloud.google.com/apis/credentials" target="_blank" rel="noopener" style={{color:"#10b981",textDecoration:"none"}}>Google Cloud Console</a> 取得金鑰。API Key 會自動儲存。
            </p>
          </div>
        </div>

        <button className="fu" onClick={geolocate} disabled={geoLoading}
          style={{animationDelay:".12s",display:"flex",alignItems:"center",gap:8,padding:"14px 28px",borderRadius:16,background:"linear-gradient(135deg,#10b981,#0d9488)",color:"#fff",fontSize:15,fontWeight:700,boxShadow:"0 8px 32px rgba(16,185,129,.25)",marginBottom:8,animation:"glow 3s ease-in-out infinite"}}>
          {geoLoading?<span style={{width:18,height:18,border:"2.5px solid rgba(255,255,255,.3)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>:<SvgIcon path={ICO.nav} size={18} fill="white" color="white"/>}
          {geoLoading?"定位中...":"📍 使用目前位置"}
        </button>
        {geoMsg&&<p className="fi" style={{fontSize:12,color:geoMsg.includes("定位到")?"#10b981":"#f59e0b",marginBottom:8}}>{geoMsg}</p>}

        <p className="fu" style={{animationDelay:".2s",fontSize:11,color:"#444",letterSpacing:3,marginTop:16,marginBottom:12}}>或選擇目的地</p>
        <div className="fu" style={{animationDelay:".25s",display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,maxWidth:440,width:"100%"}}>
          {REGIONS.map(r=>{const cnt=Object.values(DB[r.n]||{}).flat().length;return(
            <button key={r.n} onClick={()=>setRegion(r.n)}
              style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"12px 4px",borderRadius:14,background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.06)",color:"#ccc",transition:"all .25s"}}
              onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.borderColor="rgba(16,185,129,.3)"}}
              onMouseLeave={e=>{e.currentTarget.style.transform="";e.currentTarget.style.borderColor="rgba(255,255,255,.06)"}}>
              <span style={{fontSize:16,fontWeight:900}}>{r.n}</span>
              <span style={{fontSize:8,color:"#555"}}>{r.desc}</span>
              {cnt>0&&<span style={{fontSize:8,color:"#444"}}>{cnt}筆</span>}
            </button>
          )})}
        </div>
      </div>
    </div>
  );

  /* ═══ MAIN VIEW ═══ */
  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      <div style={{position:"sticky",top:0,zIndex:50,background:"rgba(8,10,15,.93)",backdropFilter:"blur(12px)",borderBottom:"1px solid rgba(255,255,255,.04)"}}>
        <div style={{maxWidth:1200,margin:"0 auto",padding:"8px 12px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <h1 style={{fontSize:14,fontWeight:900,cursor:"pointer"}} onClick={()=>{setRegion(null);setView("explore")}}><span style={{color:"#10b981"}}>台灣</span><span style={{color:"#666"}}>旅遊通</span></h1>
            <div style={{position:"relative"}}>
              <button onClick={()=>setPicker(!picker)} style={{display:"flex",alignItems:"center",gap:4,padding:"5px 10px",borderRadius:8,fontSize:11,fontWeight:700,color:"#888",background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.06)"}}>
                <SvgIcon path={ICO.pin} size={10} color="#10b981"/>{region}<SvgIcon path={ICO.chevD} size={10}/>
              </button>
              {picker&&<div style={{position:"absolute",top:"100%",left:0,marginTop:4,width:280,padding:8,borderRadius:14,background:"#181b22",border:"1px solid rgba(255,255,255,.08)",boxShadow:"0 12px 40px rgba(0,0,0,.6)",zIndex:60,display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:4}}>
                {REGIONS.map(r=><button key={r.n} onClick={()=>{setRegion(r.n);setPicker(false);setSearch("");setCat("attraction")}} style={{padding:"8px 4px",borderRadius:8,fontSize:11,fontWeight:700,background:r.n===region?"rgba(16,185,129,.12)":"transparent",color:r.n===region?"#10b981":"#888",border:"none"}}>{r.n}</button>)}
              </div>}
            </div>
            {apiKey?<span style={{fontSize:8,padding:"3px 8px",borderRadius:20,background:"rgba(16,185,129,.1)",color:"#10b981",fontWeight:700}}>📷+🗺️</span>
            :<span style={{fontSize:8,padding:"3px 8px",borderRadius:20,background:"rgba(255,255,255,.03)",color:"#555"}}>無照片</span>}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:4}}>
            {["explore","plan"].map(v=><button key={v} onClick={()=>{setView(v);setPicker(false)}} style={{padding:"5px 14px",borderRadius:8,fontSize:11,fontWeight:700,background:view===v?"#10b981":"transparent",color:view===v?"#fff":"#555",border:"none"}}>{v==="explore"?"探索":"行程"}</button>)}
            <button onClick={()=>{setSidebar(!sidebar);setPicker(false)}} style={{position:"relative",padding:6,borderRadius:8,color:"#555",background:"none",border:"none"}}>
              <SvgIcon path={ICO.menu} size={18}/>
              {itin.length>0&&<span style={{position:"absolute",top:-2,right:-2,width:18,height:18,borderRadius:"50%",background:"#10b981",color:"#fff",fontSize:9,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{itin.length}</span>}
            </button>
          </div>
        </div>
      </div>

      {picker&&<div style={{position:"fixed",inset:0,zIndex:40}} onClick={()=>setPicker(false)}/>}

      <div style={{flex:1,display:"flex",maxWidth:1200,margin:"0 auto",width:"100%",position:"relative"}}>
        <div style={{flex:1,minWidth:0,padding:"12px 12px 40px"}} onClick={()=>setPicker(false)}>
          {view==="explore"&&(
            <div className="fi" style={{display:"flex",flexDirection:"column",gap:12}}>
              <div style={{display:"flex",gap:6}}>{CATS.map(c=>{const a=cat===c.id;const cnt=(DB[region]?.[c.id]||[]).length;return(
                <button key={c.id} onClick={()=>{setCat(c.id);setSearch("")}} style={{display:"flex",alignItems:"center",gap:5,padding:"8px 14px",borderRadius:10,fontSize:12,fontWeight:700,background:a?c.c+"18":"rgba(255,255,255,.02)",border:`1.5px solid ${a?c.c+"44":"rgba(255,255,255,.04)"}`,color:a?c.c:"#6b7280"}}>{c.n}<span style={{fontSize:10,opacity:.5}}>({cnt})</span></button>
              )})}</div>
              <div style={{position:"relative"}}>
                <div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)"}}><SvgIcon path={ICO.search} size={14} color="#444"/></div>
                <input type="text" placeholder={`搜尋${region}的${CATS.find(c=>c.id===cat)?.n}...`} value={search} onChange={e=>setSearch(e.target.value)} style={{width:"100%",padding:"10px 12px 10px 36px",borderRadius:10,fontSize:14,color:"#fff",background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",outline:"none"}}/>
              </div>
              {filtered.length>0?(
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:14}}>
                  {filtered.map((p,i)=><Card key={p.n} p={p} catId={cat} onAdd={add} added={nameSet.has(p.n)} regionName={region} apiKey={apiKey} transportMode={curTrans.gm}/>)}
                </div>
              ):<div style={{textAlign:"center",padding:"48px 0",color:"#555"}}>{data.length===0?`${region}的${CATS.find(c=>c.id===cat)?.n}資料建置中...`:"沒有符合的結果"}</div>}
            </div>
          )}

          {view==="plan"&&(
            <div className="fi" style={{display:"flex",flexDirection:"column",gap:16}}>
              {!plan?(
                <div style={{textAlign:"center",padding:"40px 16px",borderRadius:18,background:"rgba(255,255,255,.01)",border:"1px solid rgba(255,255,255,.04)"}}>
                  <div style={{fontSize:40,marginBottom:12}}>🗺️</div>
                  <h3 style={{fontSize:20,fontWeight:800,marginBottom:6}}>行程規劃</h3>
                  <p style={{fontSize:13,color:"#555",marginBottom:20}}>{itin.length===0?"到「探索」加入地點":`已選 ${itin.length} 個地點（${[...new Set(itin.map(i=>i._region))].join("、")}）`}</p>
                  {itin.length>0&&<>
                    <p style={{fontSize:12,color:"#777",marginBottom:10}}>選擇交通方式</p>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,maxWidth:380,margin:"0 auto 20px"}}>
                      {TRANS.map(tr=><button key={tr.id} onClick={()=>setTransport(tr.id)} style={{padding:"12px 8px",borderRadius:12,textAlign:"center",background:transport===tr.id?"rgba(16,185,129,.1)":"rgba(255,255,255,.02)",border:`1.5px solid ${transport===tr.id?"rgba(16,185,129,.3)":"rgba(255,255,255,.04)"}`,color:transport===tr.id?"#10b981":"#777"}}>
                        <div style={{fontSize:24}}>{tr.e}</div>
                        <div style={{fontSize:11,fontWeight:700,marginTop:2}}>{tr.n}</div>
                        <div style={{fontSize:8,color:"#555",marginTop:2}}>{tr.note}</div>
                      </button>)}
                    </div>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:20}}>
                      <span style={{fontSize:13,color:"#666"}}>天數</span>
                      <div style={{display:"flex",alignItems:"center",borderRadius:10,background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)"}}>
                        <button onClick={()=>setDays(Math.max(1,days-1))} style={{padding:"6px 14px",color:"#777",fontWeight:700,fontSize:18,background:"none",border:"none"}}>−</button>
                        <span style={{padding:"6px 18px",fontSize:22,fontWeight:900,color:"#10b981"}}>{days}</span>
                        <button onClick={()=>setDays(Math.min(7,days+1))} style={{padding:"6px 14px",color:"#777",fontWeight:700,fontSize:18,background:"none",border:"none"}}>+</button>
                      </div>
                    </div>
                    <button onClick={()=>setPlan(smartPlan(itin,days,transport))} style={{padding:"14px 32px",borderRadius:14,fontSize:15,fontWeight:700,color:"#fff",background:"linear-gradient(135deg,#10b981,#0d9488)",boxShadow:"0 6px 20px rgba(16,185,129,.25)",border:"none",display:"inline-flex",alignItems:"center",gap:6}}>
                      <SvgIcon path={ICO.zap} size={16} fill="white" color="white"/> 產生行程
                    </button>
                  </>}
                </div>
              ):(<>
                <PlanView plan={plan} apiKey={apiKey}/>
                <div style={{display:"flex",justifyContent:"center"}}><button onClick={()=>setPlan(null)} style={{display:"flex",alignItems:"center",gap:6,padding:"10px 20px",borderRadius:10,fontSize:12,fontWeight:700,color:"#555",background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)"}}><SvgIcon path={ICO.rotate} size={12}/>重新規劃</button></div>
              </>)}
            </div>
          )}
        </div>

        {sidebar&&<div style={{position:"fixed",inset:0,zIndex:40,background:"rgba(0,0,0,.5)"}} onClick={()=>setSidebar(false)}/>}
        <div style={{display:sidebar?"block":"none",position:"fixed",right:0,top:0,height:"100vh",width:260,background:"#0d0f14",borderLeft:"1px solid rgba(255,255,255,.04)",overflowY:"auto",zIndex:50,padding:14}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
            <h2 style={{fontWeight:700,fontSize:13,color:"#888",display:"flex",alignItems:"center",gap:6}}><SvgIcon path={ICO.map} size={13} color="#10b981"/>我的行程{itin.length>0&&<span style={{fontSize:9,padding:"2px 8px",borderRadius:20,background:"rgba(16,185,129,.12)",color:"#10b981"}}>{itin.length}</span>}</h2>
            <button onClick={()=>setSidebar(false)} style={{padding:4,color:"#555",background:"none",border:"none"}}><SvgIcon path={ICO.x} size={16}/></button>
          </div>
          {!itin.length?<div style={{textAlign:"center",padding:"40px 0",fontSize:10,color:"#444"}}>到各縣市按「加入行程」<br/>可跨區混搭</div>:(
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              {itin.map((item,i)=>{const c=CATS.find(x=>x.id===item.category)||CATS[0];return(
                <div key={item.id} style={{display:"flex",alignItems:"center",gap:6,padding:8,borderRadius:10,background:"rgba(255,255,255,.02)"}}>
                  <div style={{display:"flex",flexDirection:"column",gap:1}}>
                    <button onClick={()=>mv(i,-1)} disabled={!i} style={{color:"#444",opacity:!i?.2:1,padding:0,background:"none",border:"none"}}><SvgIcon path={ICO.chevU} size={10}/></button>
                    <button onClick={()=>mv(i,1)} disabled={i===itin.length-1} style={{color:"#444",opacity:i===itin.length-1?.2:1,padding:0,background:"none",border:"none"}}><SvgIcon path={ICO.chevD} size={10}/></button>
                  </div>
                  <div style={{width:22,height:22,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",background:`${c.c}15`,fontSize:9,fontWeight:700,color:c.c,flexShrink:0}}>{i+1}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{fontSize:10,fontWeight:700,color:"#aaa",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.n}</p>
                    <p style={{fontSize:8,color:"#444"}}>{item._region} ・ {c.n}</p>
                  </div>
                  <button onClick={()=>openGoogleMapsNav(item.n,item.a,curTrans.gm)} style={{color:"#60a5fa",padding:2,background:"none",border:"none"}}><SvgIcon path={ICO.compass} size={11} color="#60a5fa"/></button>
                  <button onClick={()=>rm(i)} style={{color:"#333",padding:2,background:"none",border:"none"}}><SvgIcon path={ICO.trash} size={11}/></button>
                </div>
              )})}
            </div>
          )}
          {itin.length>0&&<div style={{marginTop:14,display:"flex",flexDirection:"column",gap:8}}>
            <button onClick={()=>{setPlan(smartPlan(itin,days,transport));setView("plan");setSidebar(false)}} style={{width:"100%",padding:12,borderRadius:10,fontSize:12,fontWeight:700,color:"#fff",background:"linear-gradient(135deg,#10b981,#0d9488)",display:"flex",alignItems:"center",justifyContent:"center",gap:6,border:"none"}}><SvgIcon path={ICO.zap} size={13} fill="white" color="white"/>排行程</button>
            <button onClick={()=>setItin([])} style={{width:"100%",padding:6,fontSize:9,color:"#333",background:"none",border:"none"}}>清空全部</button>
          </div>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
