const hDist=(a,b,c,d)=>{const R=6371,t=x=>x*Math.PI/180,dL=t(c-a),dN=t(d-b),s=Math.sin(dL/2)**2+Math.cos(t(a))*Math.cos(t(c))*Math.sin(dN/2)**2;return R*2*Math.atan2(Math.sqrt(s),Math.sqrt(1-s))};
const fmtDate=ts=>{if(!ts)return"";const d=ts.toDate?ts.toDate():new Date(ts);return d.getFullYear()+"/"+(d.getMonth()+1)+"/"+d.getDate()+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0")};

/* ======= Places API（含電話・價位・評論）======= */
const cache=new Map();
const FM='places.id,places.displayName,places.formattedAddress,places.rating,places.userRatingCount,places.photos,places.location,places.editorialSummary,places.currentOpeningHours,places.googleMapsUri,places.priceLevel,places.reviews,places.primaryTypeDisplayName,places.websiteUri,places.nationalPhoneNumber,places.internationalPhoneNumber,places.parkingOptions';
const parseP=(p,cat)=>{const pk=p.parkingOptions||{};return{id:p.id,n:p.displayName?.text||'',a:p.formattedAddress||'',r:p.rating||0,rc:p.userRatingCount||0,lat:p.location?.latitude,lng:p.location?.longitude,d:p.editorialSummary?.text||'',photos:p.photos||[],hours:p.currentOpeningHours?.weekdayDescriptions||[],isOpen:p.currentOpeningHours?.openNow,mapsUrl:p.googleMapsUri||'',category:cat,tel:p.nationalPhoneNumber||p.internationalPhoneNumber||'',web:p.websiteUri||'',price:p.priceLevel?["","PRICE_LEVEL_FREE","PRICE_LEVEL_INEXPENSIVE","PRICE_LEVEL_MODERATE","PRICE_LEVEL_EXPENSIVE","PRICE_LEVEL_VERY_EXPENSIVE"].indexOf(p.priceLevel):0,typeName:p.primaryTypeDisplayName?.text||'',reviews:(p.reviews||[]).slice(0,3).map(r=>({t:r.text?.text||'',a:r.authorAttribution?.displayName||'',s:r.rating||0})),parking:{free:!!pk.freeParkingLot,paid:!!pk.paidParkingLot,street:!!pk.freeStreetParking||!!pk.paidStreetParking,garage:!!pk.freeGarageParking||!!pk.paidGarageParking,valet:!!pk.valetParking,any:!!(pk.freeParkingLot||pk.paidParkingLot||pk.freeStreetParking||pk.paidStreetParking||pk.freeGarageParking||pk.paidGarageParking)}}};
async function fetchP(key,cLat,cLng,rad,rName,catId,isGeo,onP){
  const ck=cLat.toFixed(2)+cLng.toFixed(2)+catId;if(cache.has(ck))return cache.get(ck);
  const cat=CATS.find(c=>c.id===catId);const hdrs={'Content-Type':'application/json','X-Goog-Api-Key':key,'X-Goog-FieldMask':FM};
  const loc={circle:{center:{latitude:cLat,longitude:cLng},radius:rad}};const seen=new Set();const all=[];
  const qs=isGeo?cat.qs.map(q=>q).concat(cat.qs.slice(0,2).map(q=>rName+' '+q)):cat.qs.map(q=>rName+' '+q);
  const batches=await Promise.all(qs.map(async q=>{try{const r=await fetch('https://places.googleapis.com/v1/places:searchText',{method:'POST',headers:hdrs,body:JSON.stringify({textQuery:q,maxResultCount:20,languageCode:_lang==='id'?'id':'zh-TW',locationBias:loc})});if(!r.ok)return[];const d=await r.json();return(d.places||[]).map(p=>parseP(p,catId))}catch{return[]}}));
  for(const b of batches){for(const p of b){if(!seen.has(p.id)){seen.add(p.id);all.push(p)}}if(onP)onP(all.length)}
  all.forEach(p=>{p._dist=(p.lat&&p.lng)?hDist(cLat,cLng,p.lat,p.lng):9999});
  cache.set(ck,all);return all;
}
/* ======= 停車場搜尋 ======= */
const pkCache=new Map();
async function findParking(key,lat,lng){
  if(!lat||!lng)return[];
  const ck=lat.toFixed(2)+','+lng.toFixed(2);if(pkCache.has(ck))return pkCache.get(ck);
  try{const r=await fetch('https://places.googleapis.com/v1/places:searchText',{method:'POST',
    headers:{'Content-Type':'application/json','X-Goog-Api-Key':key,'X-Goog-FieldMask':'places.displayName,places.formattedAddress,places.location,places.googleMapsUri'},
    body:JSON.stringify({textQuery:'停車場',maxResultCount:5,languageCode:_lang==='id'?'id':'zh-TW',locationBias:{circle:{center:{latitude:lat,longitude:lng},radius:5000}}})});
    if(!r.ok){pkCache.set(ck,[]);return[]}const d=await r.json();
    const res=(d.places||[]).map(p=>({n:p.displayName?.text||'',a:p.formattedAddress||'',lat:p.location?.latitude,lng:p.location?.longitude,url:p.googleMapsUri||'',dist:hDist(lat,lng,p.location?.latitude||0,p.location?.longitude||0)})).sort((a,b)=>a.dist-b.dist).slice(0,2);
    pkCache.set(ck,res);return res}catch{pkCache.set(ck,[]);return[]}
}
async function addParkingToPlan(key,plan){
  if(!plan?.days)return plan;const tasks=[];
  for(const day of plan.days){for(const s of day.stops){
    if(s.parking?.any)continue;if(!s.lat)continue;
    tasks.push(findParking(key,s.lat,s.lng).then(r=>{s.nearbyPk=r}))}}
  await Promise.all(tasks);
  /* 深拷貝讓 React 偵測到變化 */
  return JSON.parse(JSON.stringify(plan));
}

/* ======= Routes API 真實通勤時間 ======= */
const rtCache=new Map();
async function getRouteMin(key,lat1,lng1,lat2,lng2,transId){
  if(!lat1||!lat2)return null;
  const mode={car:'DRIVE',walk:'WALK',bus:'TRANSIT',train:'TRANSIT'}[transId]||'DRIVE';
  const ck=lat1.toFixed(3)+','+lng1.toFixed(3)+'→'+lat2.toFixed(3)+','+lng2.toFixed(3)+':'+mode;
  if(rtCache.has(ck))return rtCache.get(ck);
  try{const r=await fetch('https://routes.googleapis.com/directions/v2:computeRoutes',{method:'POST',
    headers:{'Content-Type':'application/json','X-Goog-Api-Key':key,'X-Goog-FieldMask':'routes.duration'},
    body:JSON.stringify({origin:{location:{latLng:{latitude:lat1,longitude:lng1}}},destination:{location:{latLng:{latitude:lat2,longitude:lng2}}},travelMode:mode})});
    if(!r.ok){rtCache.set(ck,null);return null}const d=await r.json();const dur=d.routes?.[0]?.duration;
    if(!dur){rtCache.set(ck,null);return null}
    const min=Math.max(1,Math.round(parseInt(dur.replace('s',''))/60));rtCache.set(ck,min);return min
  }catch{rtCache.set(ck,null);return null}
}
const STOP_DUR={'🌅 早餐':45,'🍜 午餐':60,'🌙 晚餐':75,'🏨 住宿':0,'🏛 景點':75,'🏛 額外':60};
const addMinF=(t,m)=>{const[h,mn]=t.split(':').map(Number);const tot=h*60+mn+m;return String(Math.floor(tot/60)%24).padStart(2,'0')+':'+String(tot%60).padStart(2,'0')};
async function addRealTimesToPlan(key,plan,transId){
  if(!plan?.days)return plan;
  /* 收集所有相鄰站對，平行查 Routes API */
  const pairs=[];
  for(const day of plan.days)for(let i=1;i<day.stops.length;i++)pairs.push({a:day.stops[i-1],b:day.stops[i]});
  await Promise.all(pairs.map(async({a,b})=>{const min=await getRouteMin(key,a.lat,a.lng,b.lat,b.lng,transId);if(min!=null)b.commute=min}));
  /* 用真實通勤重算所有到達時間 */
  for(const day of plan.days){let t='08:00';for(let i=0;i<day.stops.length;i++){const s=day.stops[i];if(i>0)t=addMinF(t,s.commute||5);s.time=t;t=addMinF(t,STOP_DUR[s.label]||60)}}
  plan.transId=transId;
  return JSON.parse(JSON.stringify(plan));
}

const wxCache=new Map();
async function fetchWx(lat,lng){
  const k=lat.toFixed(1)+','+lng.toFixed(1);if(wxCache.has(k))return wxCache.get(k);
  try{const r=await fetch('https://wttr.in/'+lat+','+lng+'?format=j1');if(!r.ok)return null;const d=await r.json();
    const cur=d.current_condition?.[0];const wx={temp:cur?.temp_C||'',feel:cur?.FeelsLikeC||'',desc:cur?.lang_zh?.[0]?.value||cur?.weatherDesc?.[0]?.value||'',icon:cur?.weatherCode,humidity:cur?.humidity||'',wind:cur?.windspeedKmph||''};

const compressImg=(file,maxPx=1000,q=0.85)=>new Promise(res=>{const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');let w=img.width,h=img.height;if(w>h){h=h*maxPx/w;w=maxPx}else{w=w*maxPx/h;h=maxPx}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',q))};img.src=e.target.result};r.readAsDataURL(file)});

/* ======= Setup ======= */
function Setup({onDone}){
  const[user,setUser]=useState(null);const[authLoading,setAuthLoading]=useState(true);
  const[key,setKey]=useState('');const[busy,setBusy]=useState(false);const[err,setErr]=useState("");const[loadingKey,setLoadingKey]=useState(false);
  const[bgIdx,setBgIdx]=useState(0);
  useEffect(()=>{const t=setInterval(()=>setBgIdx(i=>(i+1)%3),6000);return()=>clearInterval(t)},[]);
  useEffect(()=>{const t=setTimeout(()=>{setAuthLoading(false);setLoadingKey(false)},6000);return()=>clearTimeout(t)},[]);
  /* 監聯登入狀態 */
  useEffect(()=>{if(!fbOK){setAuthLoading(false);return}return auth.onAuthStateChanged(u=>{setUser(u);setAuthLoading(false);
    if(u&&db){setLoadingKey(true);
      /* 存基本資料 */
      db.collection("users").doc(u.uid).set({email:u.email||"",name:u.displayName||"",lastLogin:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}).catch(()=>{});
      /* 自動註冊白名單（如果不存在就建立，預設 enabled） */
      db.collection("whitelist").doc(u.uid).get().then(wDoc=>{
        if(!wDoc.exists)db.collection("whitelist").doc(u.uid).set({email:u.email||'',name:u.displayName||'',enabled:true,addedAt:firebase.firestore.FieldValue.serverTimestamp()}).catch(()=>{});
      }).catch(()=>{});
      /* 查後台：共享 Key 是否啟用 + 此用戶是否有權限 */
      Promise.all([
        db.collection("admin").doc("config").get(),
        db.collection("whitelist").doc(u.uid).get()
      ]).then(([cfgDoc,wDoc])=>{
        const cfg=cfgDoc.exists?cfgDoc.data():{};
        const wData=wDoc.exists?wDoc.data():{};
        /* 條件：後台啟用 + 有共享 Key + 此用戶白名單啟用 */
        if(cfg.active&&cfg.sharedKey&&wData.enabled!==false){
          const k=cfg.sharedKey;setKey(k);
          hashKey(k).then(g=>{saveK(k);saveG(g);onDone(k,g)}).catch(()=>setLoadingKey(false));return;
        }
        /* 不符合 → 清掉可能殘留的共享 Key，改查個人 Key */
        const lk=getK();
        /* 如果本地存的是共享 Key 但權限被關了，清掉 */
        if(cfg.sharedKey&&lk===cfg.sharedKey&&(wData.enabled===false||!cfg.active)){
          localStorage.removeItem('tw_api_key');localStorage.removeItem('tw_group_id');
          setLoadingKey(false);return;
        }
        /* 查個人 Firestore Key */
        db.collection("users").doc(u.uid).get().then(d=>{
          if(d.exists&&d.data().apiKey&&d.data().apiKey!==cfg.sharedKey){
            const k=d.data().apiKey;setKey(k);hashKey(k).then(g=>{saveK(k);saveG(g);onDone(k,g)})}
          else if(lk&&lk!==cfg.sharedKey){setKey(lk);hashKey(lk).then(g=>{saveK(lk);saveG(g);
            db.collection("users").doc(u.uid).set({apiKey:lk},{merge:true}).catch(()=>{});onDone(lk,g)})}
          else setLoadingKey(false)
        }).catch(()=>setLoadingKey(false));
      }).catch(()=>{
        /* Firestore 失敗 fallback：用本地 Key */
        const lk=getK();if(lk){setKey(lk);hashKey(lk).then(g=>{saveK(lk);saveG(g);onDone(lk,g)})}
        else setLoadingKey(false);
      });
    }
  })},[]);
  const signIn=async()=>{if(!fbOK)return;try{await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())}catch(e){setErr("登入失敗，請再試一次")}};
  const go=async()=>{if(!key.trim()||!key.startsWith("AIza")){setErr("API Key 以 AIza 開頭");return}setBusy(true);setErr("");
    try{const r=await fetch('https://places.googleapis.com/v1/places:searchText',{method:'POST',headers:{'Content-Type':'application/json','X-Goog-Api-Key':key.trim(),'X-Goog-FieldMask':'places.id'},body:JSON.stringify({textQuery:"Tokyo Tower",maxResultCount:1})});
      if(r.ok){const g=await hashKey(key.trim());saveK(key.trim());saveG(g);
        /* 存 key 到 Firestore */
        if(user&&db)db.collection("users").doc(user.uid).set({apiKey:key.trim(),email:user.email||"",name:user.displayName||""},{merge:true}).catch(()=>{});
        setBusy(false);onDone(key.trim(),g)}

/* ======= 智慧行程排序 ======= */
const SPEED={car:40,walk:4,bus:20,train:60};
function smartPlan(items,days,transId){
  const speed=SPEED[transId]||30;
  /* 分類 */
  const atts=items.filter(i=>i.category==='attraction');
  const foods=items.filter(i=>i.category==='food');
  const hotels=items.filter(i=>i.category==='hotel');
  /* 每天框架: 早餐→景點→午餐→景點→晚餐→住宿 */
  const result=[];
  const usedA=new Set(),usedF=new Set(),usedH=new Set();
  /* 找最近的未用項目 */
  const nearest=(list,used,lat,lng)=>{let best=null,bd=1e9;list.forEach((p,i)=>{if(used.has(i))return;const d=p.lat&&lat?hDist(lat,lng,p.lat,p.lng):9999;if(d<bd){bd=d;best=i}});return best};
  /* 通勤時間（分鐘）- 路程≈直線×1.4 + 紅綠燈 */
  const commute=(a,b)=>{if(!a?.lat||!b?.lat)return 10;const d=hDist(a.lat,a.lng,b.lat,b.lng)*1.4;return Math.max(2,Math.round(d/speed*60+2))};
  const addMin=(t,m)=>{const[h,mn]=t.split(':').map(Number);const tot=h*60+mn+m;return String(Math.floor(tot/60)%24).padStart(2,'0')+':'+String(tot%60).padStart(2,'0')};
  const mkStop=(p,time,label)=>({time,name:p.n,address:p.a||'',type:p.category,tel:p.tel||'',lat:p.lat,lng:p.lng,mapsUrl:p.mapsUrl,label,commute:0,parking:p.parking||null});
  for(let d=0;d<days;d++){
    const stops=[];let t='08:00',lastP=null;
    /* 早餐 */
    const bf=nearest(foods,usedF,lastP?.lat||items[0]?.lat,lastP?.lng||items[0]?.lng);
    if(bf!=null){const p=foods[bf];usedF.add(bf);const s=mkStop(p,t,'🌅 早餐');if(lastP)s.commute=commute(lastP,p);stops.push(s);lastP=p;t=addMin(t,45+s.commute)}
    /* 上午景點 2 個 */
    for(let j=0;j<2;j++){const idx=nearest(atts,usedA,lastP?.lat,lastP?.lng);if(idx!=null){const p=atts[idx];usedA.add(idx);const cm=lastP?commute(lastP,p):0;const s=mkStop(p,t,'🏛 景點');s.commute=cm;stops.push(s);lastP=p;t=addMin(t,75+cm)}}
    /* 午餐 */
    const ln=nearest(foods,usedF,lastP?.lat,lastP?.lng);
    if(ln!=null){const p=foods[ln];usedF.add(ln);const cm=lastP?commute(lastP,p):0;const s=mkStop(p,t,'🍜 午餐');s.commute=cm;stops.push(s);lastP=p;t=addMin(t,60+cm)}
    /* 下午景點 2 個 */
    for(let j=0;j<2;j++){const idx=nearest(atts,usedA,lastP?.lat,lastP?.lng);if(idx!=null){const p=atts[idx];usedA.add(idx);const cm=lastP?commute(lastP,p):0;const s=mkStop(p,t,'🏛 景點');s.commute=cm;stops.push(s);lastP=p;t=addMin(t,75+cm)}}
    /* 晚餐 */
    const dn=nearest(foods,usedF,lastP?.lat,lastP?.lng);
    if(dn!=null){const p=foods[dn];usedF.add(dn);const cm=lastP?commute(lastP,p):0;const s=mkStop(p,t,'🌙 晚餐');s.commute=cm;stops.push(s);lastP=p;t=addMin(t,75+cm)}
    /* 住宿 */
    const ht=nearest(hotels,usedH,lastP?.lat,lastP?.lng);
    if(ht!=null){const p=hotels[ht];usedH.add(ht);const cm=lastP?commute(lastP,p):0;const s=mkStop(p,t,'🏨 住宿');s.commute=cm;stops.push(s);lastP=p}
    /* 剩餘景點塞進去 */
    if(d===days-1){[...usedA].length;atts.forEach((p,i)=>{if(!usedA.has(i)){usedA.add(i);t=addMin(t,60);stops.push(mkStop(p,t,'🏛 額外'))}})}
    result.push({day:d+1,stops});
  }
  return result;
}
/* ======= 自動推薦行程（API 抓取）======= */
async function autoRecommend(apiKey,cLat,cLng,regionName,days,transId){
  const speed=SPEED[transId]||30;
  const hdrs={'Content-Type':'application/json','X-Goog-Api-Key':apiKey,'X-Goog-FieldMask':'places.id,places.displayName,places.formattedAddress,places.rating,places.userRatingCount,places.location,places.editorialSummary,places.currentOpeningHours,places.googleMapsUri,places.nationalPhoneNumber,places.internationalPhoneNumber,places.photos,places.parkingOptions'};
  const loc={circle:{center:{latitude:cLat,longitude:cLng},radius:15000}};
  const doSearch=async(q)=>{try{const r=await fetch('https://places.googleapis.com/v1/places:searchText',{method:'POST',headers:hdrs,body:JSON.stringify({textQuery:q,maxResultCount:10,languageCode:_lang==='id'?'id':'zh-TW',locationBias:loc})});if(!r.ok)return[];const d=await r.json();return(d.places||[]).map(p=>parseP(p,'auto'))}catch{return[]}};
  /* 平行搜尋 */
  const[atts,breakfasts,lunches,dinners,hotels]=await Promise.all([
    doSearch(regionName+' 熱門景點 必去'),
    doSearch(regionName+' 早餐 早午餐'),
    doSearch(regionName+' 午餐 餐廳 小吃'),
    doSearch(regionName+' 晚餐 餐廳 推薦'),
    doSearch(regionName+' 飯店 民宿 住宿')
  ]);
  /* 依評分排序 */
  const byR=a=>[...a].sort((x,y)=>(y.r*Math.log10(y.rc+1))-(x.r*Math.log10(x.rc+1)));
  const sAtts=byR(atts),sBf=byR(breakfasts),sLn=byR(lunches),sDn=byR(dinners),sHt=byR(hotels);
  const commute=(a,b)=>{if(!a?.lat||!b?.lat)return 10;const d=hDist(a.lat,a.lng,b.lat,b.lng)*1.4;return Math.max(2,Math.round(d/speed*60+2))};
  const addMin=(t,m)=>{const[h,mn]=t.split(':').map(Number);const tot=h*60+mn+m;return String(Math.floor(tot/60)%24).padStart(2,'0')+':'+String(tot%60).padStart(2,'0')};
  const mkS=(p,time,label)=>({time,name:p.n,address:p.a||'',type:label.includes('景點')?'attraction':'food',tel:p.tel||'',lat:p.lat,lng:p.lng,mapsUrl:p.mapsUrl,label,commute:0,rating:p.r,rc:p.rc,parking:p.parking||null});
  const result=[];let aIdx=0;
  for(let d=0;d<days;d++){
    const stops=[];let t='08:00',last=null;
    /* 早餐 */
    if(sBf[d]){const p=sBf[d],cm=last?commute(last,p):0;stops.push({...mkS(p,t,'🌅 早餐'),commute:cm});last=p;t=addMin(t,45+cm)}
    /* 上午景點×2 */
    for(let j=0;j<2&&aIdx<sAtts.length;j++,aIdx++){const p=sAtts[aIdx],cm=last?commute(last,p):0;stops.push({...mkS(p,t,'🏛 景點'),commute:cm});last=p;t=addMin(t,75+cm)}
    /* 午餐 */
    if(sLn[d]){const p=sLn[d],cm=last?commute(last,p):0;stops.push({...mkS(p,t,'🍜 午餐'),commute:cm});last=p;t=addMin(t,60+cm)}
    /* 下午景點×2 */
    for(let j=0;j<2&&aIdx<sAtts.length;j++,aIdx++){const p=sAtts[aIdx],cm=last?commute(last,p):0;stops.push({...mkS(p,t,'🏛 景點'),commute:cm});last=p;t=addMin(t,75+cm)}
    /* 晚餐 */
    if(sDn[d]){const p=sDn[d],cm=last?commute(last,p):0;stops.push({...mkS(p,t,'🌙 晚餐'),commute:cm});last=p;t=addMin(t,75+cm)}
    /* 住宿 */
    if(sHt[d%sHt.length]){const p=sHt[d%sHt.length],cm=last?commute(last,p):0;stops.push({...mkS(p,t,'🏨 住宿'),commute:cm});last=p}
    result.push({day:d+1,stops});
  }
  return result;
}


function GMap({apiKey,regions,checkins,country,region,online,userLoc,user,onSelect,history}){
  const ref=useRef(null);const mapRef=useRef(null);const mkRef=useRef([]);
  useEffect(()=>{
    if(!ref.current||!apiKey)return;
    const init=()=>{
      if(!window.google?.maps)return;const gm=window.google.maps;
      mkRef.current.forEach(m=>m.setMap(null));mkRef.current=[];
      const bounds=new gm.LatLngBounds();
      regions.forEach(r=>bounds.extend({lat:r.lat,lng:r.lng}));
      if(!mapRef.current){
        mapRef.current=new gm.Map(ref.current,{mapTypeId:'terrain',disableDefaultUI:true,zoomControl:true,gestureHandling:'greedy',
          styles:[{featureType:'water',stylers:[{color:'#0a1828'}]},{featureType:'landscape',stylers:[{color:'#1a3a1a'}]},{elementType:'labels.text.fill',stylers:[{color:'#cccccc'}]},{elementType:'labels.text.stroke',stylers:[{color:'#111111'},{weight:3}]},{featureType:'road',elementType:'geometry',stylers:[{color:'#2a3a2a'}]},{featureType:'poi',stylers:[{visibility:'off'}]}]});
      }
      mapRef.current.fitBounds(bounds,{top:20,bottom:20,left:20,right:20});
      /* 區域 markers */
      const mx=Math.max(1,...regions.map(r=>checkins[country+'-'+r.n]||0));
      regions.forEach(r=>{const rKey=country+'-'+r.n;const cnt=checkins[rKey]||0;const isHere=region===r.n;
        const mk=new gm.Marker({position:{lat:r.lat,lng:r.lng},map:mapRef.current,
          label:{text:r.n+(cnt?' ('+cnt+')':''),color:isHere?'#f59e0b':'#fff',fontSize:'11px',fontWeight:'700'},
          icon:{path:gm.SymbolPath.CIRCLE,scale:cnt?8+Math.min(cnt*2,16):6,
            fillColor:cnt?'#10b981':'#555',fillOpacity:cnt?.7:.3,
            strokeColor:isHere?'#f59e0b':cnt?'#10b981':'#888',strokeWeight:isHere?3:1.5}});
        mk.addListener('click',()=>onSelect(r.n));mkRef.current.push(mk)});
      /* 打卡記錄 markers */
      (history||[]).filter(h=>h.country===country&&h.lat&&h.lng).forEach(h=>{
        const mk=new gm.Marker({position:{lat:h.lat,lng:h.lng},map:mapRef.current,title:h.placeName,zIndex:50,
          label:{text:'📍',fontSize:'18px'},
          icon:{path:gm.SymbolPath.CIRCLE,scale:14,fillColor:'#f59e0b',fillOpacity:.95,strokeColor:'#fff',strokeWeight:2.5}});
        const info=new gm.InfoWindow({content:'<div style="color:#333;font-size:14px;font-weight:700;max-width:220px;padding:4px">'+
          '<div style="font-size:15px;margin-bottom:4px">📍 '+h.placeName+'</div>'+
          (h.note?'<div style="font-size:12px;color:#666;margin-bottom:4px">'+h.note+'</div>':'')+
          (h.companions?.length?'<div style="font-size:11px;color:#d97706">👥 '+h.companions.map(c=>c.name).join('、')+'</div>':'')+
          '<div style="font-size:11px;color:#999;margin-top:2px">'+fmtDate(h.ts)+'</div></div>'});
        mk.addListener('click',()=>info.open(mapRef.current,mk));mkRef.current.push(mk)});
      /* 線上旅伴 */
      online.filter(u=>u.lat&&u.lng).forEach(u=>{
        const mk=new gm.Marker({position:{lat:u.lat,lng:u.lng},map:mapRef.current,title:u.name,
          icon:u.photo?{url:u.photo,scaledSize:new gm.Size(28,28),anchor:new gm.Point(14,14)}:
            {path:gm.SymbolPath.CIRCLE,scale:10,fillColor:'#10b981',fillOpacity:.8,strokeColor:'#10b981',strokeWeight:2}});
        mkRef.current.push(mk)});
      /* 自己 */
      if(userLoc&&user){
        const mk=new gm.Marker({position:{lat:userLoc.lat,lng:userLoc.lng},map:mapRef.current,title:'我',zIndex:999,
          icon:user.photoURL?{url:user.photoURL,scaledSize:new gm.Size(36,36),anchor:new gm.Point(18,18)}:
            {path:gm.SymbolPath.CIRCLE,scale:14,fillColor:'#f59e0b',fillOpacity:1,strokeColor:'#f59e0b',strokeWeight:3}});
        mkRef.current.push(mk)}
    };
    if(window.google?.maps){init()}
    else if(!document.getElementById('gmjs')){const s=document.createElement('script');s.id='gmjs';s.src='https://maps.googleapis.com/maps/api/js?key='+apiKey;s.onload=init;document.head.appendChild(s)}
    else{const t=setInterval(()=>{if(window.google?.maps){clearInterval(t);init()}},200)}
  },[apiKey,regions,checkins,country,region,online,userLoc,user,history]);
  return <div ref={ref} style={{width:'100%',height:'55vh',minHeight:350,borderRadius:16,overflow:'hidden',border:'1px solid rgba(255,255,255,.06)'}}/>
}

          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}><p style={{fontSize:14,fontWeight:700}}>👥 白名單</p><span style={{fontSize:11,padding:"3px 10px",borderRadius:20,background:"rgba(16,185,129,.1)",color:"#10b981",fontWeight:700}}>{adWl.filter(w=>w.enabled).length}/{adWl.length}</span></div>
          {!adWl.length?<div style={{padding:32,textAlign:"center",color:"#444",fontSize:12}}>尚無用戶</div>
          :adWl.map(w=><div key={w.uid} style={{display:"flex",alignItems:"center",gap:10,padding:12,borderRadius:12,background:"#12141a",border:"1px solid rgba(255,255,255,.04)"}}>
            <div style={{width:40,height:40,borderRadius:"50%",background:w.enabled?"rgba(16,185,129,.1)":"rgba(239,68,68,.06)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}}>{w.enabled?"✅":"⛔"}</div>
            <div style={{flex:1,minWidth:0}}><p style={{fontSize:14,fontWeight:700,color:w.enabled?"#eee":"#555"}}>{w.name||"未知"}</p><p style={{fontSize:10,color:"#555"}}>{w.email}</p></div>
            <div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}>
              <button onClick={()=>adToggleUser(w.uid,w.enabled)} style={{position:"relative",width:44,height:24,borderRadius:12,border:"none",cursor:"pointer",background:w.enabled?"linear-gradient(135deg,#10b981,#0d9488)":"#333"}}><span style={{position:"absolute",top:2,left:w.enabled?22:2,width:20,height:20,borderRadius:"50%",background:"#fff",transition:"left .2s",boxShadow:"0 1px 4px rgba(0,0,0,.3)"}}/></button>
              <button onClick={()=>adKickUser(w.uid,w.name)} style={{fontSize:9,color:"#ef4444",background:"none",border:"none"}}>踢出</button>
            </div>
          </div>)}
        </div>}
      </div>
    </div>}

    {/* Sidebar */}
    {sidebar&&<div style={{position:"fixed",inset:0,zIndex:40,background:"rgba(0,0,0,.5)"}} onClick={()=>setSidebar(false)}/>}
    <div style={{display:sidebar?"block":"none",position:"fixed",right:0,top:0,height:"100vh",width:260,background:"#0d0f14",borderLeft:"1px solid rgba(255,255,255,.04)",overflowY:"auto",zIndex:50,padding:14}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}><h2 style={{fontWeight:700,fontSize:13,color:"#888"}}>{tr("sidebar")} {itin.length>0&&<span style={{fontSize:9,padding:"2px 8px",borderRadius:20,background:"rgba(16,185,129,.12)",color:"#10b981"}}>{itin.length}</span>}</h2><button onClick={()=>setSidebar(false)} style={{padding:4,color:"#555",background:"none",border:"none"}}><Ico d={I.x} s={16}/></button></div>
      {!itin.length?<div style={{textAlign:"center",padding:"40px 0",fontSize:10,color:"#444"}}>{tr("sidebarEmpty")}</div>:<div style={{display:"flex",flexDirection:"column",gap:4}}>{itin.map((item,i)=>{const c=CATS.find(x=>x.id===item.category)||CATS[0];return <div key={item.id} style={{display:"flex",alignItems:"center",gap:6,padding:8,borderRadius:10,background:"rgba(255,255,255,.02)"}}>
        <div style={{width:20,height:20,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",background:c.c+"15",fontSize:9,fontWeight:700,color:c.c,flexShrink:0}}>{i+1}</div>
        <div style={{flex:1,minWidth:0}}><p style={{fontSize:10,fontWeight:700,color:"#aaa",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.n}</p><p style={{fontSize:8,color:"#444"}}>{item._region}</p></div>
        {item.tel&&<a href={"tel:"+item.tel} style={{color:"#10b981",padding:2}}><Ico d={I.phone} s={10} c="#10b981"/></a>}
        <button onClick={()=>rm(i)} style={{color:"#333",padding:2,background:"none",border:"none"}}><Ico d={I.trash} s={11}/></button>
      </div>})}</div>}
      {itin.length>0&&<div style={{marginTop:10,display:"flex",flexDirection:"column",gap:6}}>
        <button onClick={()=>{setView("plan");setSidebar(false)}} style={{width:"100%",padding:10,borderRadius:10,fontSize:12,fontWeight:700,color:"#fff",background:"linear-gradient(135deg,#10b981,#0d9488)",display:"flex",alignItems:"center",justifyContent:"center",gap:6,border:"none"}}><Ico d={I.zap} s={13} f="white" c="white"/>{tr("plan")}</button>
        <button onClick={()=>setItin([])} style={{width:"100%",padding:6,fontSize:9,color:"#333",background:"none",border:"none"}}>清空全部</button>
      </div>}
    </div>
  </div>
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(r=>r.forEach(s=>s.unregister()))}
</script>
</body>
</html>
