        {p._dist!=null&&p._dist<9999&&<span style={{flexShrink:0,padding:"1px 6px",borderRadius:8,background:"rgba(16,185,129,.1)",color:"#10b981",fontSize:9,fontWeight:700}}>{p._dist<1?(p._dist*1000).toFixed(0)+'m':p._dist.toFixed(1)+'km'}</span>}
      </div>

      {(p.d||p.reviews?.[0]?.t)&&<>
        <p onClick={()=>setExp(!exp)} style={{fontSize:12,color:"#9ca3af",lineHeight:1.7,cursor:"pointer",...(!exp?{display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}:{})}}>{p.d||p.reviews[0].t}</p>
        <button onClick={()=>setExp(!exp)} style={{fontSize:10,color:"#555",background:"none",border:"none",padding:0,textAlign:"left"}}>{exp?"收起 ▲":"看更多 ▼"}</button>

          <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:2}}><span style={{fontSize:10,fontWeight:700,color:"#aaa"}}>{rv.a}</span>{rv.s>0&&<span style={{fontSize:9,color:"#f59e0b"}}>{"★".repeat(rv.s)}</span>}</div>
          <p style={{fontSize:11,color:"#888",lineHeight:1.6,display:"-webkit-box",WebkitLineClamp:3,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{rv.t}</p>
        </div>)}
        {p.web&&<a href={p.web} target="_blank" style={{fontSize:10,display:"inline-flex",alignItems:"center",gap:3,marginTop:4}}><Ico d={I.ext} s={10} c="#60a5fa"/>官網</a>}
      </div>}
      {/* 按鈕列 */}
      <div style={{display:"flex",alignItems:"center",gap:5,paddingTop:6,borderTop:"1px solid rgba(255,255,255,.04)",flexWrap:"wrap"}}>
        <button className="nb" onClick={()=>openNav(p.n,p.a,gm)} style={{background:"rgba(59,130,246,.12)",color:"#60a5fa"}}><Ico d={I.compass} s={11} c="#60a5fa"/>導航</button>
        {/* 📞 一鍵撥打 */}
        {p.tel&&<a href={"tel:"+p.tel} className="nb" style={{background:"rgba(16,185,129,.12)",color:"#10b981",textDecoration:"none"}}><Ico d={I.phone} s={11} c="#10b981"/>{p.tel}</a>}
        {p.lat&&apiKey&&<button className="nb" onClick={()=>setSv(!sv)} style={{background:"rgba(168,85,247,.1)",color:"#a855f7"}}><Ico d={I.ext} s={10} c="#a855f7"/>{sv?"收起":"街景"}</button>}
        <div style={{flex:1}}/>
        <button onClick={()=>onAdd(p,catId)} disabled={added} style={{display:"flex",alignItems:"center",gap:4,padding:"7px 12px",borderRadius:10,fontSize:11,fontWeight:700,background:added?"rgba(255,255,255,.04)":c.c,color:added?"#555":"#fff"}}>{added?<><Ico d={I.check} s={10}/>已加入</>:<><Ico d={I.plus} s={10}/>加入</>}</button>
      </div>
      {sv&&p.lat&&<div style={{position:"relative",width:"100%",paddingTop:"50%",borderRadius:12,overflow:"hidden",background:"#111",marginTop:6}}><img src={'https://maps.googleapis.com/maps/api/streetview?size=640x300&location='+p.lat+','+p.lng+'&fov=90&key='+apiKey} style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover"}} referrerPolicy="no-referrer" onError={e=>{e.target.parentElement.innerHTML='<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#555">無街景</div>'}}/></div>}
    </div>
  </div>
}

/* ======= Setup ======= */
function Setup({onDone}){
  const[key,setKey]=useState(getK());const[busy,setBusy]=useState(false);const[err,setErr]=useState("");
  const go=async()=>{if(!key.trim()||!key.startsWith("AIza")){setErr("API Key 以 AIza 開頭");return}setBusy(true);setErr("");
    try{const r=await fetch('https://places.googleapis.com/v1/places:searchText',{method:'POST',headers:{'Content-Type':'application/json','X-Goog-Api-Key':key.trim(),'X-Goog-FieldMask':'places.id'},body:JSON.stringify({textQuery:"Tokyo Tower",maxResultCount:1})});
      if(r.ok){const g=await hashKey(key.trim());saveK(key.trim());saveG(g);setBusy(false);onDone(key.trim(),g)}
      else{setBusy(false);setErr("Key 無效或未啟用 Places API")}}catch{setBusy(false);setErr("連線失敗")}};
  return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"20px 16px",position:"relative"}}><div className="hero-bg"/>
    <div className="fu" style={{textAlign:"center",marginBottom:32,zIndex:1}}>
      <h1 style={{fontSize:40,fontWeight:900,letterSpacing:-2}}><span style={{background:"linear-gradient(135deg,#10b981,#06b6d4)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>旅遊通</span></h1>
      <p style={{color:"#555",fontSize:13,marginTop:8}}>台灣・日本・泰國・韓國・香港 等 11 國<br/>輸入 API Key 即可使用，同 Key 組成旅伴</p>
    </div>
    <div className="fu" style={{animationDelay:".1s",width:"100%",maxWidth:400,display:"flex",flexDirection:"column",gap:12,zIndex:1}}>
      <input type="text" placeholder="AIzaSy..." value={key} onChange={e=>setKey(e.target.value)} style={{width:"100%",padding:"14px 16px",borderRadius:12,fontSize:15,color:"#fff",background:"rgba(255,255,255,.04)",border:"1.5px solid rgba(255,255,255,.08)",outline:"none"}} onKeyDown={e=>e.key==="Enter"&&go()}/>
      <button onClick={go} disabled={busy} style={{padding:"14px",borderRadius:12,fontSize:15,fontWeight:700,color:"#fff",background:"linear-gradient(135deg,#10b981,#0d9488)",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>{busy?<span style={{width:18,height:18,border:"2.5px solid rgba(255,255,255,.3)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>:"🔑"}{busy?"驗證中...":"開始旅行"}</button>
      {err&&<p style={{fontSize:12,color:"#ef4444",textAlign:"center"}}>{err}</p>}
      <details style={{marginTop:8}}><summary style={{fontSize:11,color:"#555",cursor:"pointer"}}>如何取得 API Key？</summary>
        <div style={{padding:"10px 0",fontSize:11,color:"#666",lineHeight:1.8}}>1. <a href="https://console.cloud.google.com" target="_blank">Google Cloud Console</a> 建立專案<br/>2. 啟用「Places API (New)」<br/>3. 憑證 → 建立 API 金鑰<br/>4. 複製貼上<br/><br/>💡 分享同一組 Key 給旅伴 → 地圖同步！</div>
      </details>
    </div>
  </div>
}

/* ======= 主應用 ======= */
function App(){
  const[apiKey,setApiKey]=useState(getK());const[groupId,setGroupId]=useState(getG());const[ready,setReady]=useState(!!apiKey&&!!groupId);
  const onSetup=useCallback((k,g)=>{setApiKey(k);setGroupId(g);setReady(true)},[]);
  const changeKey=()=>{localStorage.removeItem('tw_api_key');localStorage.removeItem('tw_group_id');setApiKey('');setGroupId('');setReady(false)};
  const[country,setCountry]=useState(null);const[region,setRegion]=useState(null);const[cat,setCat]=useState("attraction");const[search,setSearch]=useState("");const[places,setPlaces]=useState([]);const[loading,setLoading]=useState(false);const[loadCount,setLoadCount]=useState(0);const[itin,setItin]=useState([]);const[sidebar,setSidebar]=useState(false);const[transport,setTransport]=useState("car");const[plan,setPlan]=useState(null);const[days,setDays]=useState(2);const[view,setView]=useState("explore");const[geoLoading,setGeoLoading]=useState(false);const[geoMsg,setGeoMsg]=useState("");const[userLoc,setUserLoc]=useState(null);const[sortMode,setSortMode]=useState("dist");const[wx,setWx]=useState(null);
  const[user,setUser]=useState(null);const[online,setOnline]=useState([]);
  const curCountry=COUNTRIES.find(c=>c.id===country);
  const curRegion=curCountry?.regions.find(r=>r.n===region);

  useEffect(()=>{if(apiKey&&!groupId)hashKey(apiKey).then(g=>{saveG(g);setGroupId(g);setReady(true)})},[apiKey,groupId]);
  useEffect(()=>{if(!fbOK)return;return auth.onAuthStateChanged(u=>setUser(u))},[]);

  /* Online presence */
  useEffect(()=>{if(!fbOK||!user||!db||!groupId||!ready)return;const ref=db.collection("online").doc(user.uid);ref.set({uid:user.uid,name:user.displayName||"",photo:user.photoURL||"",lat:userLoc?.lat||0,lng:userLoc?.lng||0,gid:groupId,ts:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});return()=>{ref.delete().catch(()=>{})}},[user,groupId,ready]);
  useEffect(()=>{if(!fbOK||!db||!groupId||!ready)return;const unsub=db.collection("online").where("gid","==",groupId).onSnapshot(snap=>{const u=[];snap.forEach(d=>{const x=d.data();if(!user||x.uid!==user?.uid)u.push(x)});setOnline(u)});return()=>unsub()},[user,groupId,ready]);
  /* Fetch places */
  useEffect(()=>{if(!region||!curRegion||!apiKey||!ready)return;const uL=userLoc&&userLoc.region===region;const cLat=uL?userLoc.lat:curRegion.lat;const cLng=uL?userLoc.lng:curRegion.lng;
    setLoading(true);setLoadCount(0);
    fetchP(apiKey,cLat,cLng,15000,region,cat,uL,n=>setLoadCount(n)).then(d=>{setPlaces(d);setLoading(false)});
    fetchWx(curRegion.lat,curRegion.lng).then(w=>setWx(w));
  },[region,cat,apiKey,userLoc,ready]);

  if(!ready)return <Setup onDone={onSetup}/>;

  const signIn=async()=>{if(!fbOK)return;try{await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())}catch{}};
  const signOut=async()=>{if(auth)auth.signOut()};

  const filtered=(()=>{const f=search?places.filter(p=>p.n.includes(search)||p.d?.includes(search)||p.a?.includes(search)):[...places];if(sortMode==="dist")f.sort((a,b)=>(a._dist||9999)-(b._dist||9999));else f.sort((a,b)=>{const d=(b.r*Math.log10(b.rc+1))-(a.r*Math.log10(a.rc+1));return d||((a._dist||9999)-(b._dist||9999))});return f})();
  const nameSet=new Set(itin.map(i=>i.n));
  const add=(p,c)=>{if(nameSet.has(p.n))return;setItin(prev=>[...prev,{...p,category:c,_region:region,id:Date.now()}])};
  const rm=i=>setItin(p=>p.filter((_,x)=>x!==i));
  const curT=TRANS.find(x=>x.id===transport)||TRANS[0];
  const refresh=()=>{if(!curRegion)return;const uL=userLoc&&userLoc.region===region;const cLat=uL?userLoc.lat:curRegion.lat;const cLng=uL?userLoc.lng:curRegion.lng;cache.clear();setLoading(true);setLoadCount(0);fetchP(apiKey,cLat,cLng,15000,region,cat,uL,n=>setLoadCount(n)).then(d=>{setPlaces(d);setLoading(false)})};
  const geolocate=()=>{if(!navigator.geolocation){setGeoMsg("不支援定位");return}setGeoLoading(true);setGeoMsg("");navigator.geolocation.getCurrentPosition(pos=>{const lat=pos.coords.latitude,lng=pos.coords.longitude;let bestC=COUNTRIES[0],bestR=COUNTRIES[0].regions[0],minD=1e9;COUNTRIES.forEach(c=>c.regions.forEach(r=>{const d=hDist(lat,lng,r.lat,r.lng);if(d<minD){minD=d;bestC=c;bestR=r}}));setUserLoc({lat,lng,region:bestR.n});setCountry(bestC.id);setRegion(bestR.n);setGeoLoading(false);setGeoMsg('📍 '+bestC.f+' '+bestR.n)},()=>{setGeoLoading(false);setGeoMsg("定位失敗")},{timeout:15000,enableHighAccuracy:true,maximumAge:0})};

  /* ========== 選國家 ========== */
  if(!country)return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",position:"relative"}}><div className="hero-bg"/><div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"20px 16px",position:"relative",zIndex:1}}>
    <div style={{position:"absolute",top:12,right:16,display:"flex",gap:6}}>
      {user?<img src={user.photoURL} onClick={signOut} style={{width:28,height:28,borderRadius:"50%",border:"2px solid #10b981",cursor:"pointer"}} referrerPolicy="no-referrer"/>:<button onClick={signIn} style={{display:"flex",alignItems:"center",gap:4,padding:"6px 14px",borderRadius:10,fontSize:11,fontWeight:700,color:"#fff",background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)"}}><Ico d={I.login} s={14}/>登入</button>}
      <button onClick={changeKey} style={{padding:"6px 10px",borderRadius:8,fontSize:10,color:"#555",background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)"}}>🔑</button>
    </div>
    <div className="fu" style={{textAlign:"center",marginBottom:24}}>
      <h1 style={{fontSize:44,fontWeight:900,letterSpacing:-2,lineHeight:1.1}}><span style={{background:"linear-gradient(135deg,#10b981,#14b8a6,#06b6d4)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>旅遊通</span></h1>
      <p style={{color:"#555",fontSize:13,marginTop:8}}>選擇國家開始探索</p>
      {online.length>0&&<p style={{fontSize:10,color:"#10b981",marginTop:4}}>👥 {online.length} 位旅伴在線</p>}
    </div>
    <button className="fu" onClick={geolocate} disabled={geoLoading} style={{animationDelay:".1s",display:"flex",alignItems:"center",gap:8,padding:"12px 24px",borderRadius:14,background:"linear-gradient(135deg,#10b981,#0d9488)",color:"#fff",fontSize:14,fontWeight:700,marginBottom:6,animation:"glow 3s ease-in-out infinite"}}>{geoLoading?<span style={{width:16,height:16,border:"2px solid rgba(255,255,255,.3)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>:<Ico d={I.nav} s={16} f="white" c="white"/>}{geoLoading?"定位中...":"📍 自動定位"}</button>
    {geoMsg&&<p className="fi" style={{fontSize:11,color:"#10b981",marginBottom:8}}>{geoMsg}</p>}
    <div className="fu" style={{animationDelay:".15s",display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,maxWidth:400,width:"100%",marginTop:16}}>{COUNTRIES.map(c=><button key={c.id} onClick={()=>setCountry(c.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"16px 8px",borderRadius:16,background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.06)",color:"#ccc",transition:"all .25s"}} onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-3px)";e.currentTarget.style.borderColor="rgba(16,185,129,.3)"}} onMouseLeave={e=>{e.currentTarget.style.transform="";e.currentTarget.style.borderColor="rgba(255,255,255,.06)"}}><span style={{fontSize:32}}>{c.f}</span><span style={{fontSize:13,fontWeight:700}}>{c.n}</span><span style={{fontSize:9,color:"#555"}}>{c.regions.length} 區域</span></button>)}</div>
  </div></div>;

  /* ========== 選區域 ========== */
  if(!region)return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",position:"relative"}}><div className="hero-bg"/><div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"20px 16px",position:"relative",zIndex:1}}>
    <button onClick={()=>setCountry(null)} style={{position:"absolute",top:12,left:16,padding:"6px 12px",borderRadius:8,fontSize:11,fontWeight:700,color:"#888",background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.06)"}}>← 選國家</button>
    <div className="fu" style={{textAlign:"center",marginBottom:24}}>
      <span style={{fontSize:48}}>{curCountry.f}</span>
      <h2 style={{fontSize:28,fontWeight:900,marginTop:8}}>{curCountry.n}</h2>
      <p style={{color:"#555",fontSize:12,marginTop:4}}>選擇地區</p>
    </div>
    <div className="fu" style={{animationDelay:".1s",display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,maxWidth:400,width:"100%"}}>{curCountry.regions.map(r=><button key={r.n} onClick={()=>setRegion(r.n)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"14px 6px",borderRadius:14,background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.06)",color:"#ccc"}} onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)"}} onMouseLeave={e=>{e.currentTarget.style.transform=""}}><span style={{fontSize:15,fontWeight:900}}>{r.n}</span><span style={{fontSize:8,color:"#555",textAlign:"center"}}>{r.d}</span></button>)}</div>
  </div></div>;

  /* ========== 主頁 ========== */
  return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
    <div style={{position:"sticky",top:0,zIndex:50,background:"rgba(8,10,15,.93)",backdropFilter:"blur(12px)",borderBottom:"1px solid rgba(255,255,255,.04)"}}>
      <div style={{maxWidth:1200,margin:"0 auto",padding:"8px 12px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <h1 style={{fontSize:13,fontWeight:900,cursor:"pointer"}} onClick={()=>{setRegion(null)}}><span style={{color:"#10b981"}}>{curCountry.f}</span><span style={{color:"#666",marginLeft:4}}>{curCountry.n}</span></h1>
          <button onClick={()=>setRegion(null)} style={{padding:"4px 8px",borderRadius:6,fontSize:10,fontWeight:700,color:"#888",background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.06)"}}>{region} ▾</button>
          {/* 天氣 */}
          {wx&&<span style={{fontSize:10,color:"#aaa",display:"flex",alignItems:"center",gap:3}}>{WX_ICON[wx.icon]||"🌤️"}{wx.temp}° {wx.desc}</span>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          {[{v:"explore",l:"探索"},{v:"map",l:"地圖"},{v:"plan",l:"行程"}].map(t=><button key={t.v} onClick={()=>setView(t.v)} style={{padding:"4px 10px",borderRadius:6,fontSize:10,fontWeight:700,background:view===t.v?"#10b981":"transparent",color:view===t.v?"#fff":"#555",border:"none"}}>{t.l}</button>)}
          {user?<img src={user.photoURL} onClick={signOut} style={{width:22,height:22,borderRadius:"50%",border:"1.5px solid #10b981",cursor:"pointer"}} referrerPolicy="no-referrer"/>:<button onClick={signIn} style={{padding:"3px 8px",borderRadius:6,fontSize:9,fontWeight:700,color:"#10b981",background:"rgba(16,185,129,.08)",border:"1px solid rgba(16,185,129,.15)"}}>登入</button>}
          <button onClick={()=>setSidebar(!sidebar)} style={{position:"relative",padding:5,borderRadius:8,color:"#555",background:"none",border:"none"}}><Ico d={I.menu} s={18}/>{itin.length>0&&<span style={{position:"absolute",top:-2,right:-2,width:16,height:16,borderRadius:"50%",background:"#10b981",color:"#fff",fontSize:8,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{itin.length}</span>}</button>
        </div>

    </div>

    <div style={{flex:1,maxWidth:1200,margin:"0 auto",width:"100%",padding:"12px 12px 40px"}}>

      {/* ===== 探索 ===== */}
      {view==="explore"&&<div className="fi" style={{display:"flex",flexDirection:"column",gap:12}}>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
          {CATS.map(c=>{const a=cat===c.id;return <button key={c.id} onClick={()=>{setCat(c.id);setSearch("")}} style={{display:"flex",alignItems:"center",gap:5,padding:"8px 14px",borderRadius:10,fontSize:12,fontWeight:700,background:a?c.c+"18":"rgba(255,255,255,.02)",border:"1.5px solid "+(a?c.c+"44":"rgba(255,255,255,.04)"),color:a?c.c:"#6b7280"}}>{c.n}</button>})}
          <button onClick={refresh} style={{padding:6,borderRadius:8,background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",color:"#555"}}><Ico d={I.reload} s={14}/></button>
          <div style={{flex:1}}/>
          {[{id:"dist",l:"📍 最近"},{id:"rating",l:"⭐ 評分"}].map(s=><button key={s.id} onClick={()=>setSortMode(s.id)} style={{padding:"5px 10px",borderRadius:8,fontSize:10,fontWeight:700,background:sortMode===s.id?"rgba(16,185,129,.12)":"rgba(255,255,255,.02)",border:"1px solid "+(sortMode===s.id?"rgba(16,185,129,.3)":"rgba(255,255,255,.06)"),color:sortMode===s.id?"#10b981":"#666"}}>{s.l}</button>)}

      </div>}

      {/* ===== 地圖打卡 ===== */}
      {view==="map"&&<div className="fi" style={{display:"flex",flexDirection:"column",gap:16}}>
        <div style={{textAlign:"center"}}><h2 style={{fontSize:20,fontWeight:900}}>{curCountry.f} {curCountry.n} 旅遊地圖</h2>{user&&<p style={{fontSize:11,color:"#666",marginTop:4}}>{user.displayName}</p>}{online.length>0&&<p style={{fontSize:10,color:"#10b981",marginTop:4}}>👥 {online.length} 位旅伴在線</p>}</div>
        {/* 區域卡片（打卡概覽）*/}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:8}}>
          {curCountry.regions.map(r=>{const isHere=region===r.n;return <div key={r.n} onClick={()=>{setRegion(r.n);setView("explore")}} style={{padding:14,borderRadius:14,background:isHere?"rgba(16,185,129,.08)":"#12141a",border:"1.5px solid "+(isHere?"rgba(16,185,129,.3)":"rgba(255,255,255,.04)"),cursor:"pointer",transition:"all .2s",position:"relative"}} onMouseEnter={e=>e.currentTarget.style.transform="translateY(-2px)"} onMouseLeave={e=>e.currentTarget.style.transform=""}>
            <h3 style={{fontSize:15,fontWeight:900,marginBottom:2}}>{r.n}</h3>
            <p style={{fontSize:9,color:"#555",lineHeight:1.5}}>{r.d}</p>
            {isHere&&<div style={{position:"absolute",top:8,right:8,width:8,height:8,borderRadius:"50%",background:"#10b981"}}/>}
          </div>})}
        </div>
        {/* 天氣預報 */}
        {wx&&<div style={{padding:16,borderRadius:14,background:"#12141a",border:"1px solid rgba(255,255,255,.04)"}}>
          <h3 style={{fontSize:13,fontWeight:700,color:"#888",marginBottom:8}}>🌤️ {region} 目前天氣</h3>
          <div style={{display:"flex",alignItems:"center",gap:16}}>
            <span style={{fontSize:36}}>{WX_ICON[wx.icon]||"🌤️"}</span>
            <div><p style={{fontSize:24,fontWeight:900}}>{wx.temp}°C</p><p style={{fontSize:11,color:"#888"}}>{wx.desc}</p></div>
            <div style={{marginLeft:"auto",fontSize:11,color:"#666",textAlign:"right"}}><p>體感 {wx.feel}°C</p><p>濕度 {wx.humidity}%</p><p>風速 {wx.wind}km/h</p></div>
          </div>
        </div>}
      </div>}

      {/* ===== 行程規劃 ===== */}
      {view==="plan"&&<div className="fi" style={{display:"flex",flexDirection:"column",gap:16}}>
        {!plan?<div style={{textAlign:"center",padding:"32px 16px",borderRadius:18,background:"rgba(255,255,255,.01)",border:"1px solid rgba(255,255,255,.04)"}}>
          <div style={{fontSize:40,marginBottom:12}}>🗺️</div>
          <h3 style={{fontSize:20,fontWeight:800,marginBottom:6}}>行程規劃</h3>
          <p style={{fontSize:13,color:"#555",marginBottom:20}}>{itin.length===0?"到「探索」加入地點":"已選 "+itin.length+" 個地點"}</p>
          {itin.length>0&&<>
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:20}}>
              <span style={{fontSize:13,color:"#666"}}>天數</span>
              <div style={{display:"flex",alignItems:"center",borderRadius:10,background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)"}}>
                <button onClick={()=>setDays(Math.max(1,days-1))} style={{padding:"6px 14px",color:"#777",fontWeight:700,fontSize:18,background:"none",border:"none"}}>−</button>
                <span style={{padding:"6px 18px",fontSize:22,fontWeight:900,color:"#10b981"}}>{days}</span>
                <button onClick={()=>setDays(Math.min(7,days+1))} style={{padding:"6px 14px",color:"#777",fontWeight:700,fontSize:18,background:"none",border:"none"}}>+</button>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,maxWidth:340,margin:"0 auto 20px"}}>{TRANS.map(tr=><button key={tr.id} onClick={()=>setTransport(tr.id)} style={{padding:"10px 6px",borderRadius:10,textAlign:"center",background:transport===tr.id?"rgba(16,185,129,.1)":"rgba(255,255,255,.02)",border:"1.5px solid "+(transport===tr.id?"rgba(16,185,129,.3)":"rgba(255,255,255,.04)"),color:transport===tr.id?"#10b981":"#777"}}><div style={{fontSize:20}}>{tr.e}</div><div style={{fontSize:10,fontWeight:700,marginTop:2}}>{tr.n}</div></button>)}</div>
            <button onClick={()=>{const t=curT;const pd=Math.max(2,Math.ceil(itin.length/days));const ds=[];for(let d=0;d<days;d++){const ch=itin.slice(d*pd,(d+1)*pd);if(!ch.length)continue;const ts=["08:00","09:30","11:00","12:30","14:00","15:30","17:00","18:30"];const stops=ch.map((s,i)=>({time:ts[Math.min(i,7)],name:s.n,address:s.a||"",type:s.category,tel:s.tel||"",lat:s.lat,lng:s.lng,mapsUrl:s.mapsUrl}));ds.push({day:d+1,stops})}setPlan({title:curCountry.f+" "+days+"日遊",days:ds,gm:t.gm})}} style={{padding:"14px 32px",borderRadius:14,fontSize:15,fontWeight:700,color:"#fff",background:"linear-gradient(135deg,#10b981,#0d9488)",border:"none",display:"inline-flex",alignItems:"center",gap:6}}><Ico d={I.zap} s={16} f="white" c="white"/>自動排行程</button>
          </>}
        </div>:<>
          <div style={{textAlign:"center"}}><h2 style={{fontSize:22,fontWeight:900}}>{plan.title}</h2></div>
          {plan.days?.map(day=><div key={day.day} style={{borderRadius:14,overflow:"hidden",background:"rgba(18,20,26,.85)",border:"1px solid rgba(255,255,255,.05)"}}>
            <div style={{display:"flex",alignItems:"center",gap:12,padding:14,borderBottom:"1px solid rgba(255,255,255,.04)"}}><div style={{width:44,height:44,borderRadius:10,background:"linear-gradient(135deg,#10b981,#0d9488)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:18,color:"#fff"}}>{day.day}</div><p style={{fontWeight:700,fontSize:15}}>Day {day.day}</p></div>
            <div style={{padding:14}}>{day.stops?.map((s,i)=><div key={i} style={{display:"flex",gap:12,padding:"10px 0",borderBottom:i<day.stops.length-1?"1px solid rgba(255,255,255,.03)":"none"}}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",width:40,flexShrink:0}}><span style={{fontSize:9,fontFamily:"monospace",color:"#555"}}>{s.time}</span><div style={{width:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,background:"rgba(16,185,129,.1)",border:"2px solid rgba(16,185,129,.2)",marginTop:4}}>{s.type==="food"?"🍽":"🏛"}</div></div>
              <div style={{flex:1,minWidth:0}}>
                <p style={{fontWeight:700,fontSize:13}}>{s.name}</p>
                {s.address&&<p style={{fontSize:9,color:"#555",marginTop:2}}>{s.address}</p>}
                <div style={{display:"flex",gap:4,marginTop:6,flexWrap:"wrap"}}>
                  <button className="nb" onClick={()=>openNav(s.name,s.address,plan.gm)} style={{background:"rgba(59,130,246,.12)",color:"#60a5fa",fontSize:9}}><Ico d={I.compass} s={10} c="#60a5fa"/>導航</button>
                  {s.tel&&<a href={"tel:"+s.tel} className="nb" style={{background:"rgba(16,185,129,.12)",color:"#10b981",textDecoration:"none",fontSize:9}}><Ico d={I.phone} s={10} c="#10b981"/>{s.tel}</a>}
                  {s.mapsUrl&&<button className="nb" onClick={()=>openM(s.mapsUrl)} style={{background:"rgba(255,255,255,.04)",color:"#888",fontSize:9}}>地圖</button>}
                </div>
              </div>
            </div>)}</div>
          </div>)}
          <div style={{display:"flex",justifyContent:"center"}}><button onClick={()=>setPlan(null)} style={{display:"flex",alignItems:"center",gap:6,padding:"10px 20px",borderRadius:10,fontSize:12,fontWeight:700,color:"#555",background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)"}}><Ico d={I.rotate} s={12}/>重新規劃</button></div>
        </>}
      </div>}
    </div>

    {/* Sidebar */}
    {sidebar&&<div style={{position:"fixed",inset:0,zIndex:40,background:"rgba(0,0,0,.5)"}} onClick={()=>setSidebar(false)}/>}
    <div style={{display:sidebar?"block":"none",position:"fixed",right:0,top:0,height:"100vh",width:260,background:"#0d0f14",borderLeft:"1px solid rgba(255,255,255,.04)",overflowY:"auto",zIndex:50,padding:14}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}><h2 style={{fontWeight:700,fontSize:13,color:"#888"}}>我的行程 {itin.length>0&&<span style={{fontSize:9,padding:"2px 8px",borderRadius:20,background:"rgba(16,185,129,.12)",color:"#10b981"}}>{itin.length}</span>}</h2><button onClick={()=>setSidebar(false)} style={{padding:4,color:"#555",background:"none",border:"none"}}><Ico d={I.x} s={16}/></button></div>
      {!itin.length?<div style={{textAlign:"center",padding:"40px 0",fontSize:10,color:"#444"}}>按「加入」加地點</div>:<div style={{display:"flex",flexDirection:"column",gap:4}}>{itin.map((item,i)=>{const c=CATS.find(x=>x.id===item.category)||CATS[0];return <div key={item.id} style={{display:"flex",alignItems:"center",gap:6,padding:8,borderRadius:10,background:"rgba(255,255,255,.02)"}}>
        <div style={{width:20,height:20,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",background:c.c+"15",fontSize:9,fontWeight:700,color:c.c,flexShrink:0}}>{i+1}</div>
        <div style={{flex:1,minWidth:0}}><p style={{fontSize:10,fontWeight:700,color:"#aaa",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.n}</p><p style={{fontSize:8,color:"#444"}}>{item._region}</p></div>
        {item.tel&&<a href={"tel:"+item.tel} style={{color:"#10b981",padding:2}}><Ico d={I.phone} s={10} c="#10b981"/></a>}
        <button onClick={()=>rm(i)} style={{color:"#333",padding:2,background:"none",border:"none"}}><Ico d={I.trash} s={11}/></button>
      </div>})}</div>}
      {itin.length>0&&<div style={{marginTop:10,display:"flex",flexDirection:"column",gap:6}}>
        <button onClick={()=>{setView("plan");setSidebar(false)}} style={{width:"100%",padding:10,borderRadius:10,fontSize:12,fontWeight:700,color:"#fff",background:"linear-gradient(135deg,#10b981,#0d9488)",display:"flex",alignItems:"center",justifyContent:"center",gap:6,border:"none"}}><Ico d={I.zap} s={13} f="white" c="white"/>排行程</button>
        <button onClick={()=>setItin([])} style={{width:"100%",padding:6,fontSize:9,color:"#333",background:"none",border:"none"}}>清空全部</button>
      </div>}
    </div>
  </div>
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
