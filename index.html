    body:JSON.stringify({textQuery:'еҒңи»Ҡе ҙ',maxResultCount:5,languageCode:_lang==='id'?'id':'zh-TW',locationBias:{circle:{center:{latitude:lat,longitude:lng},radius:5000}}})});

async function addParkingToPlan(key,plan){

/* ======= Routes API зңҹеҜҰйҖҡеӢӨжҷӮй–“ + иҪүд№ҳиіҮиЁҠ ======= */
const rtCache=new Map();
async function getRouteInfo(key,lat1,lng1,lat2,lng2,transId){
  if(!lat1||!lat2)return{min:null,steps:[]};
  const mode={car:'DRIVE',walk:'WALK',bus:'TRANSIT',train:'TRANSIT'}[transId]||'DRIVE';
  const ck=lat1.toFixed(3)+','+lng1.toFixed(3)+'вҶ’'+lat2.toFixed(3)+','+lng2.toFixed(3)+':'+mode;
  if(rtCache.has(ck))return rtCache.get(ck);
  const fields=mode==='TRANSIT'?'routes.duration,routes.legs.steps.travelMode,routes.legs.steps.staticDuration,routes.legs.steps.transitDetails':'routes.duration';
  try{const r=await fetch('https://routes.googleapis.com/directions/v2:computeRoutes',{method:'POST',
    headers:{'Content-Type':'application/json','X-Goog-Api-Key':key,'X-Goog-FieldMask':fields},
    body:JSON.stringify({origin:{location:{latLng:{latitude:lat1,longitude:lng1}}},destination:{location:{latLng:{latitude:lat2,longitude:lng2}}},travelMode:mode})});
    if(!r.ok){const res={min:null,steps:[]};rtCache.set(ck,res);return res}
    const d=await r.json();const dur=d.routes?.[0]?.duration;
    const min=dur?Math.max(1,Math.round(parseInt(dur.replace('s',''))/60)):null;
    /* и§ЈжһҗиҪүд№ҳжӯҘй©ҹ */
    const steps=[];
    if(mode==='TRANSIT'){const legs=d.routes?.[0]?.legs||[];
      for(const leg of legs){for(const step of(leg.steps||[])){
        const td=step.transitDetails;const sm=step.travelMode;
        const stepMin=step.staticDuration?Math.round(parseInt(step.staticDuration.replace('s',''))/60):0;
        if(sm==='WALK'&&stepMin>1){steps.push({mode:'walk',min:stepMin})}
        else if(sm==='TRANSIT'&&td){
          const vt=td.transitLine?.vehicle?.type||'';
          const icon=vt.includes('BUS')?'рҹҡҢ':vt.includes('SUBWAY')||vt.includes('METRO')?'рҹҡҮ':vt.includes('RAIL')||vt.includes('TRAIN')?'рҹҡҶ':vt.includes('TRAM')?'рҹҡҠ':'рҹҡҚ';
          steps.push({mode:'transit',icon,line:td.transitLine?.nameShort||td.transitLine?.name||'',from:td.stopDetails?.departureStop?.name||'',to:td.stopDetails?.arrivalStop?.name||'',min:stepMin,vehicle:vt})}}}}
    const res={min,steps};rtCache.set(ck,res);return res
  }catch{const res={min:null,steps:[]};rtCache.set(ck,res);return res}
}
const STOP_DUR={'рҹҢ… ж—©йӨҗ':45,'рҹҚң еҚҲйӨҗ':60,'рҹҢҷ жҷҡйӨҗ':75,'рҹҸЁ дҪҸе®ҝ':0,'рҹҸӣ жҷҜй»һ':75,'рҹҸӣ йЎҚеӨ–':60};
const MEAL_TIMES={'рҹҢ… ж—©йӨҗ':'07:30','рҹҚң еҚҲйӨҗ':'12:00','рҹҢҷ жҷҡйӨҗ':'18:00','рҹҸЁ дҪҸе®ҝ':'19:30'};
const addMinF=(t,m)=>{const[h,mn]=t.split(':').map(Number);const tot=h*60+mn+m;return String(Math.floor(tot/60)%24).padStart(2,'0')+':'+String(tot%60).padStart(2,'0')};
async function addRealTimesToPlan(key,plan,transId){
  if(!plan?.days)return plan;
  const pairs=[];
  for(const day of plan.days)for(let i=1;i<day.stops.length;i++)pairs.push({a:day.stops[i-1],b:day.stops[i]});
  await Promise.all(pairs.map(async({a,b})=>{const info=await getRouteInfo(key,a.lat,a.lng,b.lat,b.lng,transId);if(info.min!=null)b.commute=info.min;if(info.steps.length)b.transitSteps=info.steps}));
  /* з”Ёеӣәе®ҡйӨҗй»һжҷӮй–“зӮәйҢЁй»һпјҢжҷҜй»һжҷӮй–“еңЁйӨҗй»һд№Ӣй–“з”ЁйҖҡеӢӨзҙҜеҠ  */
  for(const day of plan.days){let t='07:30';
    for(let i=0;i<day.stops.length;i++){const s=day.stops[i];
      if(MEAL_TIMES[s.label]){t=MEAL_TIMES[s.label];s.time=t;t=addMinF(t,STOP_DUR[s.label]||60)}
      else{if(i>0)t=addMinF(t,s.commute||5);s.time=t;t=addMinF(t,STOP_DUR[s.label]||60)}}}
  plan.transId=transId;
  return JSON.parse(JSON.stringify(plan));
}

const compressImg=(file,maxPx=1000,q=0.85)=>new Promise(res=>{const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');let w=img.width,h=img.height;if(w>h){h=h*maxPx/w;w=maxPx}else{w=w*maxPx/h;h=maxPx}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',q))};img.src=e.target.result};r.readAsDataURL(file)});

  /* жҜҸеӨ©еӣәе®ҡжҷӮж®ө: ж—©йӨҗ07:30 вҶ’ жҷҜй»һ вҶ’ еҚҲйӨҗ12:00 вҶ’ жҷҜй»һ вҶ’ жҷҡйӨҗ18:00 вҶ’ дҪҸе®ҝ19:30 */
  const result=[];
  const usedA=new Set(),usedF=new Set(),usedH=new Set();
  const nearest=(list,used,lat,lng)=>{let best=null,bd=1e9;list.forEach((p,i)=>{if(used.has(i))return;const d=p.lat&&lat?hDist(lat,lng,p.lat,p.lng):9999;if(d<bd){bd=d;best=i}});return best};
  const commute=(a,b)=>{if(!a?.lat||!b?.lat)return 10;const d=hDist(a.lat,a.lng,b.lat,b.lng)*1.4;return Math.max(2,Math.round(d/speed*60+2))};
  const addMin=(ti,m)=>{const[h,mn]=ti.split(':').map(Number);const tot=h*60+mn+m;return String(Math.floor(tot/60)%24).padStart(2,'0')+':'+String(tot%60).padStart(2,'0')};
  const toMin=ti=>{const[h,m]=ti.split(':').map(Number);return h*60+m};
  const mkStop=(p,time,label)=>({time,name:p.n,address:p.a||'',type:p.category,tel:p.tel||'',lat:p.lat,lng:p.lng,mapsUrl:p.mapsUrl,label,commute:0,parking:p.parking||null});
  const fillSpots=(stops,lastP,startT,deadline)=>{let lp=lastP,ct=startT;
    while(toMin(ct)+75<deadline){const idx=nearest(atts,usedA,lp?.lat,lp?.lng);if(idx==null)break;
      const p=atts[idx];const cm=lp?commute(lp,p):0;
      if(toMin(ct)+cm+75>deadline)break;
      usedA.add(idx);const s=mkStop(p,ct,'рҹҸӣ жҷҜй»һ');s.commute=cm;stops.push(s);lp=p;ct=addMin(ct,75+cm)}
    return{lastP:lp,t:ct}};
  for(let d=0;d<days;d++){
    const stops=[];let lastP=null;
    /* ж—©йӨҗ еӣәе®ҡ 07:30 */
    const bf=nearest(foods,usedF,items[0]?.lat,items[0]?.lng);
    if(bf!=null){const p=foods[bf];usedF.add(bf);const cm=lastP?commute(lastP,p):0;const s=mkStop(p,'07:30','рҹҢ… ж—©йӨҗ');s.commute=cm;stops.push(s);lastP=p}
    /* дёҠеҚҲжҷҜй»һ 08:15~11:30 */
    const am=fillSpots(stops,lastP,'08:15',11*60+30);lastP=am.lastP;
    /* еҚҲйӨҗ еӣәе®ҡ 12:00 */
    const ln=nearest(foods,usedF,lastP?.lat,lastP?.lng);
    if(ln!=null){const p=foods[ln];usedF.add(ln);const cm=lastP?commute(lastP,p):0;const s=mkStop(p,'12:00','рҹҚң еҚҲйӨҗ');s.commute=cm;stops.push(s);lastP=p}
    /* дёӢеҚҲжҷҜй»һ 13:00~17:30 */
    const pm=fillSpots(stops,lastP,'13:00',17*60+30);lastP=pm.lastP;
    /* жҷҡйӨҗ еӣәе®ҡ 18:00 */
    const dn=nearest(foods,usedF,lastP?.lat,lastP?.lng);
    if(dn!=null){const p=foods[dn];usedF.add(dn);const cm=lastP?commute(lastP,p):0;const s=mkStop(p,'18:00','рҹҢҷ жҷҡйӨҗ');s.commute=cm;stops.push(s);lastP=p}
    /* дҪҸе®ҝ еӣәе®ҡ 19:30 */
    const ht=nearest(hotels,usedH,lastP?.lat,lastP?.lng);
    if(ht!=null){const p=hotels[ht];usedH.add(ht);const cm=lastP?commute(lastP,p):0;const s=mkStop(p,'19:30','рҹҸЁ дҪҸе®ҝ');s.commute=cm;stops.push(s);lastP=p}
    if(d===days-1){atts.forEach((p,i)=>{if(!usedA.has(i)){usedA.add(i);stops.push(mkStop(p,'','рҹҸӣ йЎҚеӨ–'))}})}
    result.push({day:d+1,stops});
  }
  return result;
}

async function autoRecommend(apiKey,cLat,cLng,regionName,days,transId){
  const speed=SPEED[transId]||30;
  const hdrs={'Content-Type':'application/json','X-Goog-Api-Key':apiKey,'X-Goog-FieldMask':'places.id,places.displayName,places.formattedAddress,places.rating,places.userRatingCount,places.location,places.editorialSummary,places.currentOpeningHours,places.googleMapsUri,places.nationalPhoneNumber,places.internationalPhoneNumber,places.photos,places.parkingOptions'};
  const loc={circle:{center:{latitude:cLat,longitude:cLng},radius:15000}};
  const doSearch=async(q)=>{try{const r=await fetch('https://places.googleapis.com/v1/places:searchText',{method:'POST',headers:hdrs,body:JSON.stringify({textQuery:q,maxResultCount:10,languageCode:_lang==='id'?'id':'zh-TW',locationBias:loc})});if(!r.ok)return[];const d=await r.json();return(d.places||[]).map(p=>parseP(p,'auto'))}catch{return[]}};
  /* е№іиЎҢжҗңе°Ӣ */
  const[atts,breakfasts,lunches,dinners,hotels]=await Promise.all([
    doSearch(regionName+' зҶұй–ҖжҷҜй»һ еҝ…еҺ»'),
    doSearch(regionName+' ж—©йӨҗ ж—©еҚҲйӨҗ'),
    doSearch(regionName+' еҚҲйӨҗ йӨҗе»і е°Ҹеҗғ'),
    doSearch(regionName+' жҷҡйӨҗ йӨҗе»і жҺЁи–Ұ'),
    doSearch(regionName+' йЈҜеә— ж°‘е®ҝ дҪҸе®ҝ')
  ]);
  /* дҫқи©•еҲҶжҺ’еәҸ */
  const byR=a=>[...a].sort((x,y)=>(y.r*Math.log10(y.rc+1))-(x.r*Math.log10(x.rc+1)));
  const sAtts=byR(atts),sBf=byR(breakfasts),sLn=byR(lunches),sDn=byR(dinners),sHt=byR(hotels);
  const commute=(a,b)=>{if(!a?.lat||!b?.lat)return 10;const d=hDist(a.lat,a.lng,b.lat,b.lng)*1.4;return Math.max(2,Math.round(d/speed*60+2))};
  const addMin=(t,m)=>{const[h,mn]=t.split(':').map(Number);const tot=h*60+mn+m;return String(Math.floor(tot/60)%24).padStart(2,'0')+':'+String(tot%60).padStart(2,'0')};
  const mkS=(p,time,label)=>({time,name:p.n,address:p.a||'',type:label.includes('жҷҜй»һ')?'attraction':'food',tel:p.tel||'',lat:p.lat,lng:p.lng,mapsUrl:p.mapsUrl,label,commute:0,rating:p.r,rc:p.rc,parking:p.parking||null});
  const toMin=ti=>{const[h,m]=ti.split(':').map(Number);return h*60+m};
  const result=[];let aIdx=0;
  for(let d=0;d<days;d++){
    const stops=[];let last=null;
    /* ж—©йӨҗ еӣәе®ҡ 07:30 */
    if(sBf[d]){const p=sBf[d],cm=last?commute(last,p):0;stops.push({...mkS(p,'07:30','рҹҢ… ж—©йӨҗ'),commute:cm});last=p}
    /* дёҠеҚҲжҷҜй»һ 08:15~11:30пјҲе…Ҳз®—иғҪдёҚиғҪеЎһйҖІеҺ»еҶҚеҠ пјү */
    let ct='08:15';
    while(toMin(ct)+75<11*60+30&&aIdx<sAtts.length){const p=sAtts[aIdx],cm=last?commute(last,p):0;
      if(toMin(ct)+cm+75>11*60+30)break;
      stops.push({...mkS(p,ct,'рҹҸӣ жҷҜй»һ'),commute:cm});last=p;ct=addMin(ct,75+cm);aIdx++}
    /* еҚҲйӨҗ еӣәе®ҡ 12:00 */
    if(sLn[d]){const p=sLn[d],cm=last?commute(last,p):0;stops.push({...mkS(p,'12:00','рҹҚң еҚҲйӨҗ'),commute:cm});last=p}
    /* дёӢеҚҲжҷҜй»һ 13:00~17:30 */
    ct='13:00';
    while(toMin(ct)+75<17*60+30&&aIdx<sAtts.length){const p=sAtts[aIdx],cm=last?commute(last,p):0;
      if(toMin(ct)+cm+75>17*60+30)break;
      stops.push({...mkS(p,ct,'рҹҸӣ жҷҜй»һ'),commute:cm});last=p;ct=addMin(ct,75+cm);aIdx++}
    /* жҷҡйӨҗ еӣәе®ҡ 18:00 */
    if(sDn[d]){const p=sDn[d],cm=last?commute(last,p):0;stops.push({...mkS(p,'18:00','рҹҢҷ жҷҡйӨҗ'),commute:cm});last=p}
    /* дҪҸе®ҝ еӣәе®ҡ 19:30 */
    if(sHt[d%sHt.length]){const p=sHt[d%sHt.length],cm=last?commute(last,p):0;stops.push({...mkS(p,'19:30','рҹҸЁ дҪҸе®ҝ'),commute:cm});last=p}
    result.push({day:d+1,stops});
  }
  return result;
}


function GMap({apiKey,regions,checkins,country,region,online,userLoc,user,onSelect,history}){

      /* еҚҖеҹҹ markers */
      const mx=Math.max(1,...regions.map(r=>checkins[country+'-'+r.n]||0));
      regions.forEach(r=>{const rKey=country+'-'+r.n;const cnt=checkins[rKey]||0;const isHere=region===r.n;

        const recordsHtml=place.records.slice(0,5).map(r=>

}

        <button onClick={()=>setItin([])} style={{width:"100%",padding:6,fontSize:9,color:"#333",background:"none",border:"none"}}>жё…з©әе…ЁйғЁ</button>
      </div>}
    </div>
  </div>
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
